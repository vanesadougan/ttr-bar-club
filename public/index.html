<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTR Bar Club</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--brand:#1a1a2e;--accent:#e94560;--bg:#f8f7f4;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--warn:#f59e0b;--danger:#ef4444;--promo:#f97316;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
    /* ── NOTIFICATIONS ── */
    #notif-container{position:fixed;top:64px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .notif{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-size:14px;font-weight:500;pointer-events:all;cursor:pointer;min-width:240px;max-width:320px;animation:notif-in 0.3s ease;transition:opacity 0.4s,transform 0.4s}
    .notif.hiding{opacity:0;transform:translateX(20px)}
    .notif-order{background:#1a1a2e;color:#fff;border-left:4px solid #e94560}
    .notif-bill{background:#ede9fe;color:#3b0764;border-left:4px solid #7c3aed}
    .notif-alert{background:#fef3c7;color:#78350f;border-left:4px solid #f59e0b}
    .notif-icon{font-size:20px;flex-shrink:0}
    .notif-body{flex:1;min-width:0}
    .notif-title{font-weight:600;font-size:13px}
    .notif-sub{font-size:12px;opacity:0.75;margin-top:1px}
    @keyframes notif-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    .topbar{background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;position:sticky;top:0;z-index:200}
    .logo{display:flex;align-items:center;cursor:pointer}
    .logo img{height:40px;width:40px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.2)}
    .modetabs{display:none!important;gap:4px;background:rgba(255,255,255,0.1);border-radius:8px;padding:3px}
    .modetab{padding:5px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.7);font-family:inherit}
    .modetab.active{background:#fff;color:var(--brand);font-weight:500}
    .badge{background:var(--accent);color:#fff;border-radius:12px;font-size:11px;padding:1px 6px;margin-left:4px;font-weight:600}
    .content{padding:1.5rem;max-width:980px;margin:0 auto;width:100%}
    .card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem}
    .card-title{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.5px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-group{margin-bottom:10px}
    .form-group label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
    .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
    .form-group textarea{resize:vertical;min-height:56px}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#d63651}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-ghost{background:transparent;border:0.5px solid var(--border);color:var(--muted)}.btn-ghost:hover{background:var(--bg)}
    .btn-danger{background:transparent;border:0.5px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:#fef2f2}
    .btn-outline{background:transparent;border:0.5px solid var(--accent);color:var(--accent)}.btn-outline:hover{background:#fff5f7}
    .btn-block{width:100%;text-align:center;padding:12px}
    .row-btns{display:flex;gap:4px;margin-left:4px}
    .ing-section{border:0.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--bg)}
    .toggle-switch{position:relative;display:inline-block;width:36px;height:20px}
    .toggle-switch input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;cursor:pointer;inset:0;background:#d1d5db;border-radius:20px;transition:0.2s}
    .toggle-slider:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.2s}
    .toggle-switch input:checked+.toggle-slider{background:var(--accent)}
    .toggle-switch input:checked+.toggle-slider:before{transform:translateX(16px)}
    .ing-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .ing-chip{display:flex;align-items:center;gap:4px;padding:4px 8px 4px 10px;background:var(--card);border:0.5px solid var(--border);border-radius:20px;font-size:12px}
    .ing-chip-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:0 2px}.ing-chip-remove:hover{color:var(--danger)}
    .ing-add-row{display:flex;gap:6px}
    .ing-add-row input{flex:1;padding:6px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text);outline:none}
    .ing-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:6px;background:#ede9fe;color:#5b21b6;margin-top:3px}
    .dishes-layout{display:grid;grid-template-columns:420px 1fr;gap:1.25rem;align-items:start}
    .dishes-form-panel{position:sticky;top:72px;max-height:calc(100vh - 88px);overflow-y:auto;border-radius:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .dishes-form-panel::-webkit-scrollbar{width:4px}.dishes-form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .dishes-list-panel{min-height:0}
    .form-section{border:0.5px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    .form-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bg);font-size:13px;font-weight:500;user-select:none}
    .form-section-header:hover{background:#f3f4f6}
    .form-section-body{padding:12px 14px;border-top:0.5px solid var(--border);background:var(--card)}
    .cat-sections{display:flex;flex-direction:column;gap:1rem}
    .cat-section{background:var(--card);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
    .cat-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
    .cat-section-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
    .cat-count{font-size:11px;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--muted)}
    .cat-chevron{font-size:12px;color:var(--muted);transition:transform 0.2s}
    .cat-chevron.open{transform:rotate(180deg)}
    .dish-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:0.5px solid var(--border);transition:background 0.1s}
    .dish-row:hover{background:var(--bg)}
    .dish-emoji{font-size:20px;width:32px;text-align:center;padding-top:1px;flex-shrink:0}
    .dish-info{flex:1;min-width:0}.dish-name{font-size:13px;font-weight:500}.dish-desc{font-size:11px;color:var(--muted);margin-top:1px}
    .dish-price-wrap{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
    .dish-price{font-weight:600;font-size:13px;color:var(--accent)}
    .dish-price-original{font-size:11px;color:var(--muted);text-decoration:line-through}
    .promo-chip{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:#fff7ed;color:#c2410c;border:0.5px solid #fed7aa}
    .cat-icon-entrada{color:#854d0e}.cat-icon-principal{color:#1e40af}.cat-icon-postre{color:#9d174d}.cat-icon-bebida{color:#065f46}.cat-icon-promo{color:#c2410c}
    .promo-section{border:0.5px solid #fed7aa;border-radius:10px;padding:12px;margin-bottom:10px;background:#fff7ed}
    .discount-preview{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:8px;font-size:13px;margin-top:8px;flex-wrap:wrap}
    .orders-list{display:flex;flex-direction:column;gap:10px}
    .order-card{background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:1rem}
    .order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .order-tname{font-weight:600;font-size:15px}.order-time{font-size:12px;color:var(--muted)}
    .order-items-text{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.7}
    .order-footer{display:flex;align-items:center;justify-content:space-between}
    .status{font-size:12px;font-weight:500;padding:3px 9px;border-radius:6px}
    .status-pending{background:#fef3c7;color:#92400e}.status-preparing{background:#fff7ed;color:#c2410c}.status-delivered{background:#d1fae5;color:#065f46}.status-billed{background:#ede9fe;color:#5b21b6}.status-cobrado{background:#d1fae5;color:#065f46}.status-deuda{background:#fee2e2;color:#b91c1c}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
    .metric{background:var(--bg);border-radius:10px;padding:12px;text-align:center;border:0.5px solid var(--border)}
    .metric-val{font-size:22px;font-weight:600;color:var(--accent)}.metric-lbl{font-size:11px;color:var(--muted);margin-top:2px}
    .history-filter{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
    .bill-req{background:#ede9fe;border:0.5px solid #c4b5fd;border-radius:8px;padding:8px 12px;font-size:12px;color:#5b21b6;margin-top:8px;text-align:center}
    .removed-ing{font-size:11px;color:#b45309;background:#fef3c7;border-radius:4px;padding:1px 6px;display:inline-block}
    .order-type-chip{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;margin-left:6px}
    .ot-general{background:#d1fae5;color:#065f46}.ot-individual{background:#ede9fe;color:#5b21b6}
    .rating-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:10px;border:0.5px solid var(--border);margin-bottom:8px}
    .rating-info{flex:1;min-width:0}.rating-name{font-size:14px;font-weight:500;margin-bottom:4px}
    .rating-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .rating-bar{height:6px;border-radius:3px;background:var(--warn)}
    .stars-display{display:flex;gap:2px}.star-lit{color:#f59e0b}.star-empty{color:#d1d5db}
    .ratings-hero{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    .podium-item{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px}
    .podium-rank{width:20px;font-weight:600;text-align:center;flex-shrink:0}
    .podium-rank.gold{color:#d97706}.podium-rank.silver{color:#6b7280}.podium-rank.bronze{color:#92400e}
    .no-ratings{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
    .customer-wrap{display:flex;min-height:calc(100vh - 56px)}
    .menu-col{flex:1;min-width:0;padding:1.25rem}
    .cart-col{width:290px;flex-shrink:0;border-left:0.5px solid var(--border);background:var(--card);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden}
    .mobile-cart-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--brand);color:#fff;cursor:pointer;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -2px 16px rgba(0,0,0,0.18)}
    .mobile-cart-bar-left{display:flex;align-items:center;gap:10px}
    .mobile-cart-badge{background:rgba(255,255,255,0.25);border-radius:8px;padding:3px 9px;font-size:13px;font-weight:700}
    .mobile-cart-label{font-size:15px;font-weight:600}
    .mobile-cart-total{font-size:15px;font-weight:700}
    @media(max-width:640px){
      .customer-wrap{flex-direction:column}
      .cart-col{display:none}
      .mobile-cart-bar{display:flex}
      .menu-col{padding-bottom:80px}
      .dishes-layout{grid-template-columns:1fr}.dishes-form-panel{position:relative;top:0;max-height:none}.metrics{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}
    }
    .cart-header{padding:1rem 1.25rem;border-bottom:0.5px solid var(--border);font-weight:500;font-size:15px;display:flex;align-items:center;justify-content:space-between}
    .cart-body{flex:1;overflow-y:auto;padding:1rem 1.25rem}
    .cart-footer{padding:1rem 1.25rem;border-top:0.5px solid var(--border)}
    .cart-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
    .cart-item:last-child{border:none}
    .cart-item-info{flex:1;min-width:0}.cart-item-name{font-size:13px;font-weight:500}
    .cart-item-price{font-size:13px;font-weight:500;color:var(--accent);white-space:nowrap}
    .cart-qty{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .cqbtn{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text)}
    .cqval{font-size:13px;font-weight:500;min-width:14px;text-align:center}
    .cart-total-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
    .cart-total-row.big{font-weight:600;font-size:16px;margin-top:4px;padding-top:8px;border-top:0.5px solid var(--border)}
    .cart-empty{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:13px;line-height:1.6}
    .cart-tag{font-size:11px;background:var(--bg);border:0.5px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--muted)}
    .mesa-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.5rem}
    .mesa-title{font-family:'Playfair Display',serif;font-size:28px;text-align:center}
    .mesa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px}
    .mesa-btn{padding:18px 12px;border-radius:12px;border:0.5px solid var(--border);background:var(--card);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;text-align:center}
    .mesa-btn:hover{border-color:var(--accent);color:var(--accent)}
    .mesa-btn-label{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}
    .back-btn{background:none;border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--muted)}
    .cat-tabs{display:flex;gap:8px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .cat-tabs::-webkit-scrollbar{display:none}
    .cat-tab{padding:12px 8px;border-radius:12px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:5px;font-weight:500;line-height:1.2;text-align:center;flex-shrink:0;width:88px;word-break:break-word;overflow:hidden}
    .cat-tab .cat-emoji{font-size:28px;line-height:1}
    .cat-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
    .cat-tab.promo-tab{border-color:#fed7aa;color:#c2410c;background:#fff7ed}
    .cat-tab.promo-tab.active{background:#c2410c;color:#fff;border-color:#c2410c}
    .menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(max-width:400px){.menu-grid{grid-template-columns:1fr}}
    .menu-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1rem;transition:all 0.15s}
    .menu-card:hover{border-color:var(--accent)}
    .menu-card.promo-card{border-color:#fed7aa;background:#fffbf7}
    .menu-card-emoji{font-size:26px;margin-bottom:6px}
    .menu-card-name{font-size:14px;font-weight:500;margin-bottom:3px}
    .menu-card-desc{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.4}
    .menu-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
    .menu-card-price{font-weight:600;color:var(--accent);font-size:14px}
    .menu-card-price-original{font-size:11px;color:var(--muted);text-decoration:line-through;margin-right:4px}
    .add-btn{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
    .qty-ctrl{display:flex;align-items:center;gap:5px}
    .qty-btn{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
    .qty-val{font-weight:600;font-size:14px;min-width:16px;text-align:center}
    .excl-note{font-size:11px;color:#b45309;margin-top:2px}
    .cust-modal{background:var(--card);border-radius:14px;border:1.5px solid var(--accent);padding:1.25rem;margin-bottom:1.25rem}
    .cust-ing-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
    .cust-ing-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:var(--bg);border:0.5px solid var(--border);cursor:pointer;transition:all 0.15s}
    .cust-ing-row.excluded{background:#fef2f2;border-color:#fca5a5;opacity:0.7}
    .cust-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cust-check.checked{background:var(--accent);border-color:var(--accent);color:#fff;font-size:11px}
    .strikethrough{text-decoration:line-through;color:var(--muted)}
    .mode-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.5rem;padding:2rem}
    .mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:480px}
    .mode-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1.5rem 1.25rem;cursor:pointer;text-align:center;transition:all 0.15s}
    .mode-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .mode-card-icon{font-size:36px;margin-bottom:10px}
    .mode-card-title{font-size:15px;font-weight:500;margin-bottom:4px}
    .mode-card-desc{font-size:12px;color:var(--muted);line-height:1.4}
    .name-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.25rem;padding:2rem}
    .name-input{padding:12px 16px;font-size:16px;font-family:inherit;border:0.5px solid var(--border);border-radius:10px;width:100%;max-width:300px;outline:none;background:var(--card);color:var(--text);text-align:center}
    .name-input:focus{border-color:var(--accent)}
    .bill-screen{max-width:520px;margin:0 auto;padding:1.5rem 0}
    .bill-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:1.25rem}
    .bill-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:0.5px solid var(--border)}
    .bill-row:last-child{border:none;font-weight:600;font-size:16px;margin-top:4px;padding-top:8px}
    .person-bill-section{margin-bottom:1rem}
    .person-bill-title{font-size:13px;font-weight:500;color:#1e40af;background:#dbeafe;border-radius:6px;padding:4px 10px;margin-bottom:6px;display:inline-block}
    .survey-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;margin-top:1.25rem}
    .survey-title{font-weight:500;font-size:15px;margin-bottom:4px}
    .survey-sub{font-size:13px;color:var(--muted);margin-bottom:1rem}
    .survey-dish{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border)}
    .survey-dish:last-child{border:none}
    .survey-dish-name{font-size:14px;flex:1}
    .stars{display:flex;gap:4px}
    .star{font-size:22px;cursor:pointer;color:#d1d5db;user-select:none}.star.lit{color:#f59e0b}
    .thanks-screen,.confirm-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;padding:2rem}
    .confirm-icon,.thanks-icon{font-size:56px}
    .confirm-title,.thanks-title{font-family:'Playfair Display',serif;font-size:26px}
    .order-review{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1rem;width:100%;max-width:400px;text-align:left}
    .review-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid var(--border)}
    .review-row:last-child{border:none;font-weight:600;margin-top:4px}
    .empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .new-order-pulse{animation:pulse-border 1s ease-in-out 3}
    @keyframes pulse-border{0%,100%{border-color:var(--border)}50%{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,0.15)}}
  </style>
</head>

function getCats(){
  const cats=Object.entries(DB.categories||{}).map(([k,v])=>({...v,_key:k}));
  // sort by order field, promos always first
  cats.sort((a,b)=>{
    if(a.isPromo&&!b.isPromo)return -1;
    if(!a.isPromo&&b.isPromo)return 1;
    return (a.order||0)-(b.order||0);
  });
  return cats;
}

function nowStr(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function typeObj(d,typeName){
  // Returns type object whether stored as string or object
  if(!typeName||!d.types)return null;
  const t=d.types.find(t=>typeof t==='string'?t===typeName:t.name===typeName);
  return t&&typeof t==='object'?t:null;
}
function typeFinalPrice(d,typeName,basePrice){
  const t=typeObj(d,typeName);
  if(!t)return basePrice;
  if(t.priceMode==='total')return Number(t.priceVal||basePrice);
  if(t.priceMode==='extra')return basePrice+Number(t.priceExtra||0);
  return basePrice;
}
function dishFinalPrice(d,qty,selectedType){
  const cat=DB.categories&&Object.entries(DB.categories).find(([k])=>k===d.cat);
  const isPromoCat=cat&&cat[1].isPromo;
  let base=d.price;
  if(selectedType) base=typeFinalPrice(d,selectedType,base);
  if(!isPromoCat)return base;
  if(d.is2x1&&qty>=2){
    const pairs=Math.floor(qty/2);
    const singles=qty%2;
    return Math.round((pairs*base+singles*base)/qty);
  }
  return d.promoDiscount>0?Math.round(base*(1-d.promoDiscount/100)):base;
}
function tableLabel(tid){const t=DB.tables[tid];return t?t.label:`Mesa ${tid}`;}
function tableOccupied(tid){return Object.values(DB.orders).some(o=>o.tableId===tid&&o.status!=='cobrado'&&o.status!=='deudor');}
function pendingCount(){return Object.values(DB.orders).filter(o=>o.status==='pending'||o.status==='preparing'||o.status==='billed').length;}
function starsHtml(avg,size){let h='';for(let i=1;i<=5;i++)h+=`<span class="${i<=Math.round(avg)?'star-lit':'star-empty'}" style="font-size:${size||14}px">${i<=Math.round(avg)?'★':'☆'}</span>`;return h;}

const _ESSENTIAL = 10; // dishes, categories, alerts, tables, ratings, cancellations, cafeteriaItems, cafeteriaCategories, waiters, kioskItems
function _markLoaded(){
  _loadedCount++;
  if(_loadedCount >= _ESSENTIAL && firstLoad){
    firstLoad=false;
    // Re-render solo si ya pasó la bienvenida (para que la carta cargue al instante)
    if(isMenuRoute && !menuShowWelcome) render();
    else if(!isMenuRoute) render();
  }
}

onValue(ref(db,'dishes'),  snap=>{ DB.dishes  = snap.val()||{}; _markLoaded(); if(!firstLoad) render(); });
onValue(ref(db,'categories'), snap=>{ DB.categories = snap.val()||{}; _markLoaded(); if(!firstLoad) render(); });
onValue(ref(db,'alerts'), snap=>{
  const prevAlertKeys=new Set(Object.keys(DB.alerts||{}));
  const wasEmpty=prevAlertKeys.size===0;
  DB.alerts = snap.val()||{};
  _markLoaded();
  if(!firstLoad && C.mode==='admin' && !wasEmpty){
    const newAlerts=Object.entries(DB.alerts).filter(([k,a])=>!prevAlertKeys.has(k)&&a.status==='pending');
    newAlerts.forEach(([,a])=>{ showNotif('alert','¡Llaman al mozo!',a.tableLabel||'Mesa'); });
    if(C.adminTab==='orders') render();
  }
});
onValue(ref(db,'tables'), snap=>{
  DB.tables = snap.val()||{};
  tablesLoaded = true;
  resolveTableRoute();
  _markLoaded();

  const prevBilled=new Set(Object.entries(DB.orders).filter(([,o])=>o.status==='billed').map(([k])=>k));
  const wasEmpty=prevKeys.size===0;
  DB.orders = snap.val()||{};

    const newOrders=Object.entries(DB.orders).filter(([k,o])=>!prevKeys.has(k)&&!o.isKiosko&&o.status!=='deudor');
    newOrders.forEach(([,o])=>{
      const label=DB.tables[o.tableId]?DB.tables[o.tableId].label:`Mesa`;
      showNotif('order','Nuevo pedido',`${label}${o.personName?' · '+o.personName:''}`);

    Object.entries(DB.orders).forEach(([k,o])=>{
      if(o.status==='billed'&&!prevBilled.has(k)&&prevKeys.has(k)){
        const label=DB.tables[o.tableId]?DB.tables[o.tableId].label:`Mesa`;
        const pm={efectivo:'Efectivo',credito:'Créd.',debito:'Déb.',transferencia:'Transfer.',mercadopago:'Mercado Pago'};
        showNotif('bill','Piden la cuenta',`${label}${o.paymentMethod?' · '+pm[o.paymentMethod]:''}${o.personName?' · '+o.personName:''}`);
      }
    });
  }
  if(firstLoad) { /* ya lo maneja _markLoaded */ }
  if(C.mode==='admin') archivarPedidosViejos();
  if(C.mode==='admin') limpiarAlertsViejas();
  if(isCocinaRoute){ render(); return; }
  if(C.mode==='admin' && C.adminTab==='orders' && !wasEmpty && Object.keys(DB.orders).length > prevKeys.size){
    render(); highlightNewOrder();
  } else {
    render();
  }
});

// ─── NOTIFICATION SYSTEM ──────────────────────────
function playSound(type){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='order'){
      // Two rising tones — new order
      o.frequency.setValueAtTime(520,ctx.currentTime);
      o.frequency.setValueAtTime(780,ctx.currentTime+0.12);
      g.gain.setValueAtTime(0.4,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.4);
    } else if(type==='bill'){
      // Three descending tones — bill request
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.setValueAtTime(660,ctx.currentTime+0.15);
      o.frequency.setValueAtTime(440,ctx.currentTime+0.30);
      g.gain.setValueAtTime(0.35,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.55);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.55);
    } else if(type==='alert'){
      // Urgent repeated beep — llamar al mozo
      [0,0.18,0.36].forEach(t=>{
        const o2=ctx.createOscillator();
        const g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.value=960;
        g2.gain.setValueAtTime(0.35,ctx.currentTime+t);
        g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.12);
        o2.start(ctx.currentTime+t);o2.stop(ctx.currentTime+t+0.14);
      });
    }
  }catch(e){}
}

function showNotif(type, title, sub){
  if(C.mode!=='admin') return; // only for admin
  const container=document.getElementById('notif-container');
  if(!container) return;
  const el=document.createElement('div');
  const icons={order:'🍽️',bill:'💳',alert:'🛎'};
  el.className=`notif notif-${type}`;
  el.innerHTML=`<div class="notif-icon">${icons[type]||'🔔'}</div><div class="notif-body"><div class="notif-title">${title}</div>${sub?`<div class="notif-sub">${sub}</div>`:''}</div><div style="font-size:16px;opacity:0.5;margin-left:4px">×</div>`;
  el.onclick=()=>dismissNotif(el);
  container.appendChild(el);
  playSound(type);
  setTimeout(()=>dismissNotif(el), 6000);
}

function dismissNotif(el){
  if(!el.parentNode) return;
  el.classList.add('hiding');
  setTimeout(()=>el.parentNode&&el.parentNode.removeChild(el),400);
}

// ─── ROUTING: detect /mesa/:id in URL ─────────────
let isCustomerRoute = false;
let pendingTableId = null; // store URL param until tables are loaded

let isWaiterRoute = false;
let isMenuRoute = false;
let isCocinaRoute = false;
let menuShowWelcome = true;
function initRoute(){
  const path = window.location.pathname;
  if(path==='/mozas'||path==='/mozas/'){
    isWaiterRoute = true;
    C.mode='waiter';
    document.getElementById('modetabs').style.display='none';
    render();
    return;
  }
  if(path==='/cocina'||path==='/cocina/'){
    isCocinaRoute = true;
    C.mode='cocina';
    document.getElementById('modetabs').style.display='none';
    render();
    return;
  }
  if(path==='/menu'||path==='/menu/'){
    isMenuRoute = true;
    C.mode='customer';
    C.customerStep='menu';
    C.orderMode='general';
    C.customerTableId=null;
    document.getElementById('modetabs').style.display='none';
    render();
    return;
  }
  const m = path.match(/\/mesa\/(.+)/);
  if(m){
    isCustomerRoute = true;
    C.mode='customer';
    pendingTableId = m[1];
    document.getElementById('modetabs').style.display='none';
    resolveTableRoute();
  }
}

function resolveTableRoute(){
  if(!pendingTableId) return;
  if(Object.keys(DB.tables).length === 0) return; // wait for tables to load
  const found = Object.entries(DB.tables).find(([k,v])=>k===pendingTableId||v.label===pendingTableId);
  if(found){
    C.customerTableId=found[0];
    C.orderMode='individual';
    C.customerNameInput='';
    initCustomerCat();
    C.customerStep='nameInput';
    pendingTableId=null; // resolved
  }
}

// ─── RENDER ───────────────────────────────────────
function render(){
  // Save cat-tabs scroll position before re-render
  const _catScroll=C._catScrollReset?0:(document.querySelector('.cat-tabs')?.scrollLeft||0);
  C._catScrollReset=false;
  updateClock();
  updateTopbarCart();
  // If customer route, skip auth entirely
  if(isMenuRoute){ if(menuShowWelcome){ renderMenuWelcome(document.getElementById('main-content')); } else { renderMenuOnly(document.getElementById('main-content')); } return; }
  if(isCocinaRoute){ renderCocina(document.getElementById('main-content')); return; }
  if(isCustomerRoute){
    const _prevStep=C._prevCustomerStep;
    renderCustomer();
    if(C.customerStep!==_prevStep) window.scrollTo(0,0);
    else scrollActiveCat();
    C._prevCustomerStep=C.customerStep;
    return;
  }
  // Admin requires login
  if(C.mode==='admin' && !currentUser){ renderLogin(); return; }
  const tabAdmin=document.getElementById('tab-admin');
  const tabCust=document.getElementById('tab-customer');
  if(tabAdmin) tabAdmin.classList.toggle('active',C.mode==='admin');
  if(tabCust)  tabCust.classList.toggle('active',C.mode==='customer');
  if(C.mode==='admin')renderAdmin();
  else if(C.mode==='waiter')renderWaiterMode();
  else renderCustomer();
  // Restore cat-tabs scroll position
  if(_catScroll>0){const el=document.querySelector('.cat-tabs');if(el)el.scrollLeft=_catScroll;}
}

function setMode(m){
  C.mode=m;
  if(m==='customer'){ C.customerStep='mesa';C.cart={};C.survey={items:[],ratings:{}}; }
  render();
}

// Cierre — genera Excel con SheetJS via CDN
function cajaGenerarCSV(movs, hoy){
  const rows=[['Hora','Concepto','Descripción','Debe (-)','Haber (+)','Saldo acumulado']];
  let saldoAcum=0;
  movs.forEach(m=>{
    const hora=new Date(m.ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    saldoAcum+=m.monto;
    rows.push([hora, m.concepto, m.desc||'',
      m.monto<0?Math.abs(m.monto):'',
      m.monto>=0?m.monto:'',
      saldoAcum]);
  });
  const ingresos=movs.filter(m=>m.monto>0).reduce((s,m)=>s+m.monto,0);
  const egresos=movs.filter(m=>m.monto<0).reduce((s,m)=>s+m.monto,0);
  rows.push([]);
  rows.push(['','TOTALES','',Math.abs(egresos),ingresos,saldoAcum]);
  rows.push(['','Fecha cierre',hoy,'','','']);
  return rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
}
function cajaDescargarArchivo(movs){
  const hoy=new Date().toLocaleDateString('es-AR');
  const csv=cajaGenerarCSV(movs, hoy);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`caja_${hoy.replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
window.cajaDescargar=()=>{
  const movs=getCajaHoy();
  const hoy=new Date().toLocaleDateString('es-AR');
  const csv=cajaGenerarCSV(movs,hoy);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`caja_${hoy.replace(/\//g,'-')}_parcial.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
};
window.cajaCierre=async()=>{
  // 1. Verificar pedidos sin cobrar (los deudores no bloquean el cierre)
  const hoy=new Date().toISOString().slice(0,10);
  const sinCobrar=Object.values(DB.orders).filter(o=>{
    if(o.status==='cobrado'||o.status==='deudor')return false;
    const fecha=o.createdAt?new Date(o.createdAt).toISOString().slice(0,10):null;
    return fecha===hoy;
  });
  if(sinCobrar.length>0){
    alert(`⚠️ No se puede cerrar la caja.\n\nHay ${sinCobrar.length} pedido${sinCobrar.length>1?'s':''} sin cobrar del día de hoy.\n\nCobralos primero desde el panel de Pedidos o Cobrados.`);
    return;
  }
  // 2. Confirmar cierre
  const movs=getCajaHoy();
  const saldo=movs.reduce((s,m)=>s+(m.monto||0),0);
  const ok=confirm(`¿Cerrar la caja del día?\n\nSaldo final: $${saldo.toLocaleString('es-AR')}\n\nSe descargará el resumen y se eliminarán los movimientos de la base de datos. Esta acción no se puede deshacer.`);
  if(!ok)return;
  // 3. Descargar CSV
  cajaDescargarArchivo(movs);
  // 4. Eliminar todos los movimientos: borrar todo /caja y recrear solo el estado
  const hoy2=new Date().toISOString().slice(0,10);
  await remove(ref(db,'caja'));
  // 5. Escribir solo el flag de cierre
  await set(ref(db,'caja/_cajaEstado'),{abierta:false,fechaCierre:hoy2,ts:Date.now()});
  render();
};

window.waiterPinKey=key=>{
  if(!C._waiterPinInput) C._waiterPinInput='';
  if(key==='⌫'){
    C._waiterPinInput=C._waiterPinInput.slice(0,-1);
    C._waiterPinError='';
    renderWaiterSelectScreen(document.getElementById('main-content'));
    return;
  }
  if(C._waiterPinInput.length>=4) return;
  C._waiterPinInput+=String(key);
  if(C._waiterPinInput.length===4){
    // Buscar moza con ese PIN
    const waiters=Object.entries(DB.waiters||{}).map(([k,v])=>({...v,_key:k}));
    const found=waiters.find(w=>String(w.pin)===C._waiterPinInput);
    if(found){
      C._waiterPinInput='';
      C._waiterPinError='';
      C.waiterId=found._key;
      C.waiterName=found.name;
      C.waiterStep='mesas';
      render();
    } else {
      C._waiterPinError='PIN incorrecto. Intentá de nuevo.';
      setTimeout(()=>{C._waiterPinInput='';C._waiterPinError='';renderWaiterSelectScreen(document.getElementById('main-content'));},1000);
      renderWaiterSelectScreen(document.getElementById('main-content'));
    }
    return;
  }
  renderWaiterSelectScreen(document.getElementById('main-content'));
};

function renderWaiterMesasScreen(mc){
  const myOrders=Object.entries(DB.orders)
    .map(([k,v])=>({...v,_key:k}))
    .filter(o=>o.status!=='cobrado'&&o.status!=='deudor')
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  const byTable={};
  myOrders.forEach(o=>{
    if(!byTable[o.tableId])byTable[o.tableId]=[];
    byTable[o.tableId].push(o);
  });

  // Separar mesas propias de las de otras mozas
  const myTables=[];const otherTables=[];
  Object.entries(byTable).forEach(([tableId,orders])=>{
    const ismine=orders.some(o=>o.takenBy===C.waiterName);
    if(ismine)myTables.push(tableId);else otherTables.push(tableId);
  });
  const sortByLabel=(a,b)=>(DB.tables[a]?.label||a).localeCompare(DB.tables[b]?.label||b,'es',{numeric:true});
  myTables.sort(sortByLabel);otherTables.sort(sortByLabel);
  const orderedTables=[...myTables,...otherTables];

  const nMesas=Object.keys(byTable).length;
  const initial=`<div style="width:40px;height:40px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0">${C.waiterName[0].toUpperCase()}</div>`;

  let h=`<div class="content" style="max-width:600px">`;

  // ── Header ──
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)">`;
  h+=`<div style="display:flex;align-items:center;gap:10px">${initial}<div><div style="font-size:18px;font-weight:600">${C.waiterName}</div><div style="font-size:12px;color:var(--muted)">${nMesas===0?'Sin mesas activas':myTables.length+' propia'+(myTables.length!==1?'s':'')+' · '+otherTables.length+' otra'+(otherTables.length!==1?'s':'')}</div></div></div>`;
  h+=`<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="setWaiterStep('mesa')">+ Nueva mesa</button><button class="btn btn-ghost btn-sm" onclick="setWaiterStep('select')" style="font-size:12px">Salir</button></div>`;
  h+=`</div>`;

  if(nMesas===0){
    h+=`<div style="text-align:center;padding:3rem 1rem;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">🍽️</div><div style="font-size:16px;font-weight:500;margin-bottom:6px">Sin mesas en curso</div><div style="font-size:14px">Tocá "+ Nueva mesa" para tomar el primer pedido</div></div>`;
  } else {
    // Separador visual si hay mesas propias y ajenas
    let shownDivider=false;
    orderedTables.forEach(tableId=>{
      const orders=byTable[tableId];
      const isOther=otherTables.includes(tableId);
      // Mostrar separador antes de mesas de otras mozas
      if(isOther&&!shownDivider&&myTables.length>0){
        shownDivider=true;
        h+=`<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px">Otras mesas</div>`;
      }
      const table=DB.tables[tableId];
      const tLabel=table?table.label:tableId;
      const totalMesa=orders.reduce((s,o)=>(o.items||[]).reduce((si,i)=>si+(i.finalPrice||i.price)*i.qty,s),0);
      const pendingCt=orders.filter(o=>o.status==='pending').length;
      const preparingCt=orders.filter(o=>o.status==='preparing').length;
      const delivCt=orders.filter(o=>o.status==='delivered').length;
      const isIndiv=orders.some(o=>o.orderMode==='individual');
      h+=`<div class="card" style="margin-bottom:.875rem">`;

      // ── Mesa title row ──
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">`;
      h+=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">`;
      h+=`<div style="display:inline-flex;align-items:center;padding:4px 10px;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;flex-shrink:0;white-space:nowrap">${tLabel}</div>`;
      h+=`<div style="display:flex;gap:5px;flex-wrap:wrap">`;
      if(pendingCt>0)h+=`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#fef3c7;color:#92400e">⏳ ${pendingCt} pend.</span>`;
      if(preparingCt>0)h+=`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#fff7ed;color:#c2410c">🔥 ${preparingCt} en prep.</span>`;
      const readyCt=orders.filter(o=>o.status==='delivered'&&o.readyAt).length;
      const delivNormalCt=orders.filter(o=>o.status==='delivered'&&!o.readyAt).length;
      if(readyCt>0)h+=`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#d1fae5;color:#065f46">✅ ${readyCt} listo${readyCt!==1?'s':''}</span>`;
      if(delivNormalCt>0)h+=`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#d1fae5;color:#065f46">✓ ${delivNormalCt} entregado${delivNormalCt!==1?'s':''}</span>`;
      h+=`</div></div>`;
      h+=`<button class="btn btn-primary btn-sm" onclick="waiterAddToMesa('${tableId}')">+ Agregar</button>`;
      h+=`</div>`;

      // ── Items ──
      if(isIndiv){
        const byPerson={};
        orders.forEach(o=>{const p=o.personName||'General';if(!byPerson[p])byPerson[p]=[];byPerson[p].push(o);});
        Object.entries(byPerson).forEach(([person,pOrders])=>{
          const pTotal=pOrders.reduce((s,o)=>(o.items||[]).reduce((si,i)=>si+(i.finalPrice||i.price)*i.qty,s),0);
          const pMap={};
          pOrders.forEach(o=>(o.items||[]).forEach(item=>{
            const k=item.name+(item.selectedType?'|'+item.selectedType:'');
            if(!pMap[k])pMap[k]={name:item.name,type:item.selectedType||null,qty:0,statuses:{},excl:item.excluded||[]};
            pMap[k].qty+=item.qty;pMap[k].statuses[o.status]=(pMap[k].statuses[o.status]||0)+item.qty;
          }));
          h+=`<div style="margin-bottom:8px">`;
          h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding:4px 6px;background:#f0f4ff;border-radius:6px">`;
          h+=`<span style="font-size:12px;font-weight:600;color:#1e40af">👤 ${person}</span>`;
          h+=`<span style="font-size:12px;font-weight:600;color:#1e40af">$${pTotal.toLocaleString()}</span>`;
          h+=`</div>`;
          Object.values(pMap).forEach(item=>{
            const pd=item.statuses['pending']||0,dd=item.statuses['delivered']||0;
            h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px">`;
            h+=`<span style="flex:1;font-size:13px">${item.qty}× ${item.name}${item.type?` <span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:4px">${item.type}</span>`:''}</span>`;
            h+=`<div style="display:flex;gap:3px;align-items:center">`;
            if(item.excl&&item.excl.length>0)h+=`<button onclick="alert('Sin: ${item.excl.join(', ')}')" title="Sin: ${item.excl.join(', ')}" style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#ede9fe;color:#5b21b6;border:none;cursor:pointer">P</button>`;
            if(pd>0)h+=`<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:#fef3c7;color:#92400e">⏳${pd}</span>`;
            if(dd>0)h+=`<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:#d1fae5;color:#065f46">✓${dd}</span>`;
            h+=`</div></div>`;
          });
          h+=`</div>`;
        });
      } else {
        // Agrupar por moza cuando hay varias
        const mozasOrden=[...new Set(orders.map(o=>o.takenBy||'Sin moza'))];
        const porMoza={};
        orders.forEach(o=>{const m=o.takenBy||'Sin moza';if(!porMoza[m])porMoza[m]=[];porMoza[m].push(o);});
        const multiMoza=mozasOrden.length>1;

        mozasOrden.forEach(moza=>{
          const mOrders=porMoza[moza];
          const iMap={};
          mOrders.forEach(o=>(o.items||[]).forEach(item=>{
            const k=item.name+(item.selectedType?'|'+item.selectedType:'');
            if(!iMap[k])iMap[k]={name:item.name,type:item.selectedType||null,qty:0,statuses:{},excl:item.excluded||[]};
            iMap[k].qty+=item.qty;iMap[k].statuses[o.status]=(iMap[k].statuses[o.status]||0)+item.qty;
          }));
          if(multiMoza){
            const esYo=moza===C.waiterName;
            h+=`<div style="font-size:11px;font-weight:600;padding:2px 8px;margin-bottom:4px;border-radius:5px;display:inline-block;background:${esYo?'#dbeafe':'#f3f4f6'};color:${esYo?'#1e40af':'#374151'}">👩 ${moza}${esYo?' (vos)':''}</div>`;
          }
          Object.values(iMap).forEach(item=>{
            const pd=item.statuses['pending']||0,dd=item.statuses['delivered']||0;
            h+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px">`;
            h+=`<span style="flex:1;font-size:13px">${item.qty}× ${item.name}${item.type?` <span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:4px">${item.type}</span>`:''}</span>`;
            h+=`<div style="display:flex;gap:3px;align-items:center">`;
            if(item.excl&&item.excl.length>0)h+=`<button onclick="alert('Sin: ${item.excl.join(', ')}')" title="Sin: ${item.excl.join(', ')}" style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#ede9fe;color:#5b21b6;border:none;cursor:pointer">P</button>`;
            if(pd>0)h+=`<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:#fef3c7;color:#92400e">⏳${pd}</span>`;
            if(dd>0)h+=`<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:#d1fae5;color:#065f46">✓${dd}</span>`;
            h+=`</div></div>`;
          });
        });
      }

      // ── Total + acciones de cobro ──
      const allBilled=orders.every(o=>o.status==='billed'||o.status==='cobrado');
      const hasBilled=orders.some(o=>o.status==='billed');
      const hasReady=orders.some(o=>o.status==='delivered'&&o.readyAt);
      const hasPendingOrPrep=orders.some(o=>o.status==='pending'||o.status==='preparing');
      const isShowingPayPicker=C.waiterPayMesa===tableId;
      const pmLabels={efectivo:'💵 Efectivo',credito:'💳 Crédito',debito:'💳 Débito',transferencia:'📱 Transferencia',mercadopago:'📱 Mercado Pago'};

      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)">`;
      h+=`<span style="font-size:13px;color:var(--muted)">Total</span>`;
      h+=`<span style="font-size:16px;font-weight:700;color:var(--accent)">$${totalMesa.toLocaleString()}</span>`;
      h+=`</div>`;

      // Botón entregar si cocina marcó listo
      if(hasReady && !hasBilled){
        const readyOrderKeys=orders.filter(o=>o.status==='delivered'&&o.readyAt).map(o=>o._key);
        h+=`<button onclick="waiterConfirmEntrega(${JSON.stringify(readyOrderKeys)})" style="margin-top:10px;width:100%;padding:10px;border-radius:8px;border:none;background:#10b981;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">🛎 Confirmar entrega</button>`;
      }

      if(isShowingPayPicker){
        const selPm=C.waiterPayMethod||null;
        h+=`<div style="margin-top:12px;padding:12px;background:#f8f7f4;border-radius:10px;border:0.5px solid var(--border)">`;
        h+=`<div style="font-size:13px;font-weight:600;margin-bottom:10px">Medio de pago</div>`;
        h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">`;
        ['efectivo','debito','credito','transferencia','mercadopago'].forEach(pm=>{
          const sel=selPm===pm;
          h+=`<button onclick="waiterSelectPayMethod('${pm}')" style="padding:8px 10px;border-radius:8px;border:0.5px solid ${sel?'var(--accent)':'var(--border)'};background:${sel?'#fff5f7':'var(--card)'};color:${sel?'var(--accent)':'var(--text)'};font-size:12px;font-weight:${sel?'600':'400'};cursor:pointer;font-family:inherit;text-align:left">${pmLabels[pm]}</button>`;
        });
        h+=`</div>`;
        h+=`<div style="display:flex;gap:6px">`;
        h+=`<button class="btn btn-primary" onclick="waiterRequestBill('${tableId}')" ${selPm?'':'disabled style="opacity:.4"'}>Pedir cuenta ✓</button>`;
        h+=`<button class="btn btn-ghost btn-sm" onclick="waiterCancelPayPicker()">Cancelar</button>`;
        h+=`</div></div>`;
      } else if(hasBilled){
        const pm=orders.find(o=>o.paymentMethod)?.paymentMethod;
        h+=`<div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">`;
        h+=`<span style="font-size:12px;color:#5b21b6;font-weight:500">💜 Cuenta pedida${pm?' · '+pmLabels[pm]:''}</span>`;
        h+=`<button onclick="waiterMarkCobrado('${tableId}')" style="padding:6px 14px;border-radius:8px;border:0.5px solid #065f46;background:#d1fae5;color:#065f46;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Cobrado ✓</button>`;
        h+=`</div>`;
      } else {
        if(hasPendingOrPrep){
          h+=`<div style="margin-top:10px;padding:8px 12px;border-radius:8px;background:#fef3c7;border:0.5px solid #fcd34d;font-size:12px;color:#92400e;text-align:center">⏳ Hay pedidos sin entregar</div>`;
        } else {
          h+=`<button onclick="waiterOpenPayPicker('${tableId}')" style="margin-top:10px;width:100%;padding:8px;border-radius:8px;border:0.5px solid #5b21b6;background:#ede9fe;color:#5b21b6;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">💜 Pedir cuenta</button>`;
        }
      }

      h+=`</div>`;
    });
  }

  h+=`</div>`;
  mc.innerHTML=h;
}

window.waiterRequestBill=async tableId=>{
  if(!C.waiterPayMethod){alert('Seleccioná el medio de pago');return;}
  const orders=Object.entries(DB.orders).filter(([,o])=>o.tableId===tableId&&o.status!=='cobrado');
  for(const [k] of orders){
    await update(ref(db,`orders/${k}`),{status:'billed',billRequested:true,paymentMethod:C.waiterPayMethod});
  }
  C.waiterPayMesa=null;C.waiterPayMethod=null;render();

window.waiterMarkCobrado=async tableId=>{
  if(!getCajaAbierta()){alert('La caja está cerrada. Abrí la caja antes de cobrar.');return;}
  const orders=Object.entries(DB.orders).filter(([,o])=>o.tableId===tableId&&(o.status==='billed'||o.status==='delivered'||o.status==='pending')&&o.status!=='deudor');
  // Verificar método de pago
  const pm=orders.find(([,o])=>o.paymentMethod)?.[1]?.paymentMethod||C.waiterPayMethod||null;
  let finalPm=pm;
  if(!finalPm){
    finalPm=await showPaymentChoiceModal(null);
    if(!finalPm)return;
  }
  for(const [k] of orders){
    await update(ref(db,`orders/${k}`),{status:'cobrado',paymentMethod:finalPm});
  }
  // Registrar en caja
  if(getCajaAbierta()){
    const total=orders.reduce((s,[,o])=>(o.items||[]).reduce((si,i)=>si+(i.finalPrice||i.price)*i.qty,s),0);
    if(total>0){
      const table=DB.tables[tableId];const tLabel=table?table.label:tableId;
      const pmL={efectivo:'Efectivo',debito:'Débito',credito:'Crédito',transferencia:'Transferencia',mercadopago:'Mercado Pago'};
      const concepto=`${tLabel} (${pmL[finalPm]||finalPm})`;
      const hoy=new Date().toISOString().slice(0,10);
      await push(ref(db,'caja'),{tipo:'venta',concepto,monto:total,fecha:hoy,ts:Date.now(),desc:'',paymentMethod:finalPm});
    }
  }
  render();
};

window.waiterConfirmDish=(dishId,src)=>{

window.waiterPlaceOrder=async()=>{
  if(waiterCartCount()===0)return;
  const items=Object.entries(C.waiterCart).map(([key,v])=>{
    // Mitad y mitad — key: mitad|dishId|m1Id|m2Id
    if(key.startsWith('mitad|')){
      return{name:v._mitadName||key,qty:v.qty,price:v._mitadPrice||0,finalPrice:v._mitadPrice||0,excluded:[],selectedType:null,isCafeteria:false,emoji:'🍕'};
    }
    const id=key.includes('|')?key.split('|')[0]:key;
    const dP=DB.dishes[id];const dC=DB.cafeteriaItems[id];const d=dP||dC;
    if(!d)return null;
    const isCaf=!!dC;
    return{name:d.name,qty:v.qty,price:Number(d.price),finalPrice:isCaf?Number(d.price):dishFinalPrice(d,v.qty,v.selectedType||null),excluded:v.excluded||[],selectedType:v.selectedType||null,isCafeteria:isCaf,emoji:d.emoji||null};
  }).filter(Boolean);
  await push(ref(db,'orders'),{tableId:C.waiterTableId,items,status:'pending',time:nowStr(),billRequested:false,orderMode:C.waiterOrderMode,personName:C.waiterOrderMode==='individual'?C.waiterPersonName:null,createdAt:Date.now(),takenBy:C.waiterName});
  deductTypeStock(items);
  C.waiterCart={};C.waiterStep='mesas';C.waiterTableId=null;render();
};

            ${avg?`<div style="display:flex;align-items:center;gap:3px;margin-top:2px">${starsHtml(avg,11)}<span style="font-size:11px;color:var(--muted)">${avg.toFixed(1)}</span></div>`:''}
          </div>

            <button class="btn btn-sm" onclick="toggleAvailability('${d._key}',${unavail})" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid ${unavail?'#10b981':'#9ca3af'};color:${unavail?'#065f46':'#374151'};background:${unavail?'#d1fae5':'#f3f4f6'};cursor:pointer">${unavail?'✓ Habilitar':'Deshabilitar'}</button>

            <button class="btn btn-danger btn-sm" onclick="deleteDish('${d._key}')">✕</button>
          </div>
        </div>`;

      listH+=`</div>`;
    }
    listH+=`</div>`;

  listH+=`</div>`;
  return tabsH+`<div class="dishes-layout"><div class="dishes-form-panel">${formH}</div><div class="dishes-list-panel">${listH}</div></div>`;

    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="${C.editingCat?'saveEditCat()':'addCat()'}">${C.editingCat?'Guardar':'Agregar categoría'}</button>
      ${C.editingCat?`<button class="btn btn-ghost" onclick="cancelEditCat()">Cancelar</button>`:''}
    </div>
  </div>`;

  let listH=`<div class="card">
    <div class="card-title">Categorías (${cats.length})</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Usá las flechas para cambiar el orden en el menú</div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto">`;
  if(cats.length===0){listH+=`<div class="empty-state">No hay categorías</div>`;}
  cats.forEach((cat,idx)=>{

    const isFirst=idx===0;
    const isLast=idx===cats.length-1;
    listH+=`<div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:8px;border:0.5px solid var(--border)">

        <button onclick="moveCat('${cat._key}',1)" ${isLast?'disabled':''} style="width:22px;height:22px;border-radius:4px;border:0.5px solid var(--border);background:${isLast?'transparent':'var(--card)'};color:${isLast?'var(--border)':'var(--muted)'};cursor:${isLast?'default':'pointer'};font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1">▼</button>
      </div>
      <div style="font-size:22px;width:32px;text-align:center;flex-shrink:0">${cat.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500">${cat.label}</div>
        <div style="font-size:12px;color:var(--muted)">${dishCount} plato${dishCount!==1?'s':''}${cat.isPromo?' · 🔥 Promo':''}${cat.noRating?' · ⭐ No calificar':''}${cat.directStock?' · 📦 Stock directo':''}</div>
      </div>
      <div class="row-btns">
        <button class="btn btn-ghost btn-sm" onclick="editCat('${cat._key}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCat('${cat._key}',${dishCount})">✕</button>
      </div>
    </div>`;
  });
  listH+=`</div></div>`;

  return`<div class="admin-grid">${formH}${listH}</div>`;
}

  cats.forEach(cat=>{
    const catItems=allItems.filter(d=>d.cat===cat._key);
    const open=cafCatOpen[cat._key]!==false;
    listH+=`<div class="cat-section"><div class="cat-section-header" onclick="toggleCafCatOpen('${cat._key}')"><div class="cat-section-title"><span style="font-size:16px">${cat.icon}</span><span>${cat.label}</span><span class="cat-count">${catItems.length}</span></div><span class="cat-chevron${open?' open':''}">▼</span></div>`;
    if(open){
      listH+=`<div>`;
      if(catItems.length===0)listH+=`<div style="padding:10px 14px;font-size:13px;color:var(--muted)">Sin items en esta categoría</div>`;

        listH+=`<div class="dish-row" style="${unavail?'background:#f3f4f6;opacity:0.7':''}"><div class="dish-emoji">${d.emoji||'☕'}</div><div class="dish-info"><div style="display:flex;align-items:center;gap:6px"><div class="dish-name">${d.name}</div>${unavail?`<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:#e5e7eb;color:#6b7280">Deshabilitado</span>`:''}${stockChip}${(d.recipe||[]).length>0?`<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:#ede9fe;color:#5b21b6">🧾</span>`:''}</div><div class="dish-desc">${d.desc||''}</div><div class="dish-price-wrap"><span class="dish-price">$${Number(d.price).toLocaleString()}</span></div></div><div class="row-btns"><button class="btn btn-sm" onclick="toggleCafAvailability('${d._key}',${unavail})" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid ${unavail?'#10b981':'#9ca3af'};color:${unavail?'#065f46':'#374151'};background:${unavail?'#d1fae5':'#f3f4f6'};cursor:pointer">${unavail?'✓ Habilitar':'Deshabilitar'}</button><button class="btn btn-ghost btn-sm" onclick="editCafItem('${d._key}')">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteCafItem('${d._key}')">✕</button></div></div>`;
      });
      listH+=`</div>`;
    }
    listH+=`</div>`;
  });
  listH+=`</div>`;
  return tabsH+`<div class="dishes-layout"><div class="dishes-form-panel">${formH}</div><div class="dishes-list-panel">${listH}</div></div>`;
}

        <button onclick="moveCafCat('${cat._key}',1)" ${isLast?'disabled':''} style="width:22px;height:22px;border-radius:4px;border:0.5px solid var(--border);background:${isLast?'transparent':'var(--card)'};cursor:${isLast?'default':'pointer'};font-size:11px;display:flex;align-items:center;justify-content:center">▼</button>

window.setCafSubTab=tab=>{C.cafSubTab=tab;render();};
window.toggleCafCatOpen=id=>{cafCatOpen[id]=cafCatOpen[id]===false;render();};
window.uCafF=(field,val)=>{
  const o=C.editingCafItem||C.newCafItem;
  if(field==='stock'||field==='alertAt'){
    o[field]=val===''||val==null?null:Math.max(0,Number(val));
    return;
  }o[field]=(field==='price')?Number(val):val;if(field==='cat'){render();return;}};
window.uCafCat=(field,val)=>{const o=C.editingCafCat||C.newCafCat;o[field]=val;};
window.addCafItem=()=>{
  const d=C.newCafItem;
  const stockInp=document.getElementById('caf-stock-inp');
  if(stockInp&&stockInp.value!=='')d.stock=stockInp.value;
  if(!d.name||((!d.price&&d.price!==0&&d.price!=='0')&&!d.isMitadMitad)){alert('Completá nombre y precio');return;}
  if(d.stock!=null&&d.stock!==''&&(d.alertAt===''||d.alertAt==null)){alert('Ingresá el valor de alerta de stock');return;}
  const cats=getCafCats();if(!cats.find(c=>c._key===d.cat)&&cats.length>0)d.cat=cats[0]._key;
  push(ref(db,'cafeteriaItems'),{...d,ingredients:d.ingredients||[],unavailable:false,stock:d.stock!=null&&d.stock!==''?Number(d.stock):null,alertAt:d.alertAt!=null&&d.alertAt!==''?Number(d.alertAt):null});
  C.newCafItem={name:'',desc:'',price:'',cat:cats.length>0?cats[0]._key:'',emoji:'☕',customizable:false,ingredients:[]};
  C.newCafIngInput='';render();
};
window.editCafItem=key=>{C.editingCafItem={...DB.cafeteriaItems[key],_key:key,ingredients:[...(DB.cafeteriaItems[key].ingredients||[])]};render();};
window.saveEditCafItem=()=>{
  const stockInp=document.getElementById('caf-stock-inp');
  if(stockInp&&stockInp.value!=='')C.editingCafItem.stock=stockInp.value;
  const {_key,...data}=C.editingCafItem;
  if(data.stock!=null&&data.stock!==''&&(data.alertAt===''||data.alertAt==null)){alert('Ingresá el valor de alerta de stock');return;}
  set(ref(db,`cafeteriaItems/${_key}`),{...data,stock:data.stock!=null&&data.stock!==''?Number(data.stock):null,alertAt:data.alertAt!=null&&data.alertAt!==''?Number(data.alertAt):null});
  C.editingCafItem=null;render();
};
window.cancelEditCafItem=()=>{C.editingCafItem=null;render();};
window.deleteCafItem=key=>{if(confirm('¿Eliminar este item?'))remove(ref(db,`cafeteriaItems/${key}`));};
window.toggleCafAvailability=(key,currentlyUnavail)=>{update(ref(db,`cafeteriaItems/${key}`),{unavailable:!currentlyUnavail});};
window.toggleCafCustomizable=val=>{const f=C.editingCafItem||C.newCafItem;f.customizable=val;if(!f.ingredients)f.ingredients=[];render();};
window.addCafIngredient=()=>{const inp=document.getElementById('caf-ing-input');const v=inp?inp.value.trim():'';if(!v)return;const f=C.editingCafItem||C.newCafItem;if(!f.ingredients)f.ingredients=[];f.ingredients.push(v);C.newCafIngInput='';render();};
window.removeCafIngredient=idx=>{const f=C.editingCafItem||C.newCafItem;f.ingredients.splice(idx,1);render();};
window.addCafCat=()=>{
  const c=C.newCafCat;if(!c.label){alert('Ingresá un nombre');return;}
  const cats=getCafCats();const order=cats.length>0?Math.max(...cats.map(x=>x.order||0))+1:0;
  push(ref(db,'cafeteriaCategories'),{label:c.label.trim(),icon:c.icon||'☕',isPromo:c.isPromo||false,noRating:c.noRating||false,order});
  C.newCafCat={label:'',icon:'☕',isPromo:false,noRating:false};render();
};
window.editCafCat=key=>{C.editingCafCat={...DB.cafeteriaCategories[key],_key:key};render();};
window.saveEditCafCat=()=>{const {_key,...data}=C.editingCafCat;set(ref(db,`cafeteriaCategories/${_key}`),data);C.editingCafCat=null;render();};
window.cancelEditCafCat=()=>{C.editingCafCat=null;render();};
window.deleteCafCat=(key,count)=>{if(count>0&&!confirm(`Esta categoría tiene ${count} item${count>1?'s':''}. ¿Eliminarla?`))return;remove(ref(db,`cafeteriaCategories/${key}`));};
window.moveCafCat=(key,dir)=>{const cats=getCafCats();const idx=cats.findIndex(c=>c._key===key);const swapIdx=idx+dir;if(swapIdx<0||swapIdx>=cats.length)return;const aOrder=cats[idx].order||idx,bOrder=cats[swapIdx].order||swapIdx;update(ref(db,`cafeteriaCategories/${key}`),{order:bOrder});update(ref(db,`cafeteriaCategories/${cats[swapIdx]._key}`),{order:aOrder});};

      listH+=`<div class="cat-section"><div class="cat-section-header" onclick="toggleKioskCatOpen('__uncat')"><div class="cat-section-title"><span style="font-size:16px">📦</span><span>Sin categoría</span><span class="cat-count">${uncatItems.length}</span></div><span class="cat-chevron${open?' open':''}">▼</span></div>`;
      if(open){
        listH+=`<div>`;
        uncatItems.forEach(d=>{
          const sc=d.stock!=null?Number(d.stock):null;
          const stockChip=sc!=null?`<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:${sc===0?'#fee2e2':sc<=5?'#fef3c7':'#d1fae5'};color:${sc===0?'#b91c1c':sc<=5?'#92400e':'#065f46'}">📦 ${sc}</span>`:'';
          listH+=`<div class="dish-row"><div class="dish-info"><div style="display:flex;align-items:center;gap:6px"><div class="dish-name">🏪 ${d.name}</div>${stockChip}</div>`;
          if(d.desc)listH+=`<div class="dish-desc">${d.desc}</div>`;
          listH+=`<div class="dish-price-wrap"><span class="dish-price">$${Number(d.price||0).toLocaleString()}</span></div></div>`;
          listH+=`<div class="row-btns"><button class="btn btn-ghost btn-sm" onclick="editKioskItem('${d._key}')">✏️</button><button class="btn btn-danger btn-sm" onclick="deleteKioskItem('${d._key}')">✕</button></div></div>`;
        });
        listH+=`</div>`;
      }
      listH+=`</div>`;
    }
  }
  listH+=`</div>`;
  return h+`<div class="dishes-layout"><div class="dishes-form-panel">${formH}</div><div class="dishes-list-panel">${listH}</div></div>`;
}

        <button onclick="moveKioskCat('${cat._key}',1)" ${isLast?'disabled':''} style="width:22px;height:22px;border-radius:4px;border:0.5px solid var(--border);background:${isLast?'transparent':'var(--card)'};cursor:${isLast?'default':'pointer'};font-size:11px;display:flex;align-items:center;justify-content:center">▼</button>
      </div>
      <div style="font-size:22px;width:32px;text-align:center">${cat.icon}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${cat.label}</div>
        <div style="font-size:12px;color:var(--muted)">${cnt} item${cnt!==1?'s':''}</div></div>
      <div class="row-btns">
        <button class="btn btn-ghost btn-sm" onclick="editKioskCat('${cat._key}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteKioskCat('${cat._key}',${cnt})">✕</button>

  return `<div class="admin-grid">${formH}${listH}</div>`;

window.uKioskCat=(f,v)=>{const o=C.editingKioskCat||C.newKioskCat;o[f]=v;};
window.addKioskCat=()=>{
  const f=C.newKioskCat;
  if(!f.label||!f.label.trim()){alert('Ingresá un nombre');return;}
  const cats=getKioskCats();
  push(ref(db,'kioskCategories'),{label:f.label.trim(),icon:f.icon||'🛍',order:cats.length});
  C.newKioskCat={label:'',icon:'🛍'};render();
};
window.editKioskCat=key=>{C.editingKioskCat={...DB.kioskCategories[key],_key:key};render();};
window.saveKioskCat=()=>{
  const {_key,...data}=C.editingKioskCat;
  set(ref(db,`kioskCategories/${_key}`),data);
  C.editingKioskCat=null;render();
};
window.cancelKioskCat=()=>{C.editingKioskCat=null;render();};
window.deleteKioskCat=(key,cnt)=>{
  if(cnt>0&&!confirm(`Esta categoría tiene ${cnt} item${cnt!==1?'s':''}. ¿Eliminar igual?`))return;
  remove(ref(db,`kioskCategories/${key}`));
};
window.moveKioskCat=async(key,dir)=>{
  const cats=getKioskCats();
  const idx=cats.findIndex(c=>c._key===key);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=cats.length)return;
  const a=cats[idx],b=cats[swapIdx];
  await update(ref(db,`kioskCategories/${a._key}`),{order:b.order??swapIdx});
  await update(ref(db,`kioskCategories/${b._key}`),{order:a.order??idx});
};

function renderStockTab(){
  const ings=Object.entries(DB.ingredients||{}).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const fi=C.editingIng||C.newIng||{name:'',unit:'u',stock:'',alertAt:''};
  const UNITS=['u','kg','g','l','ml'];

  const directStockCats=new Set(getCats().filter(c=>c.directStock).map(c=>c._key));
  const directStockDishes=[];
  Object.entries(DB.dishes).filter(([,d])=>(d.stock!=null||directStockCats.has(d.cat))&&(!d.recipe||d.recipe.length===0)).forEach(([k,d])=>{
    // Si tiene tipos con stock individual, expandir en filas por tipo
    const typesWithStock=(d.types||[]).filter(t=>typeof t==='object'&&t.stock!=null);
    if(typesWithStock.length>0){
      typesWithStock.forEach(t=>{
        directStockDishes.push({
          ...d, _key:k, _src:'dishes',
          _isTypeRow:true, _typeName:t.name,
          name:`${d.name} — ${t.name}`,
          stock:t.stock??0,
          alertAt:t.alertAt??null,
          barcodes:t.barcodes||[],
          barcode:t.barcode||null,
          _typeObj:t,
        });
      });
    } else {
      directStockDishes.push({...d,_key:k,_src:'dishes',stock:d.stock??0});
    }
  });
  Object.entries(DB.cafeteriaItems||{}).filter(([,d])=>d.stock!=null&&(!d.recipe||d.recipe.length===0)).forEach(([k,d])=>directStockDishes.push({...d,_key:k,_src:'cafeteria'}));
  Object.entries(DB.kioskItems||{}).forEach(([k,d])=>directStockDishes.push({...d,_key:k,_src:'kiosko',stock:d.stock!=null?d.stock:0}));

  // ── Scanner de código de barras (modo carga masiva) ──
  let h=`<div style="max-width:900px">`;
  const batchItems = C._barcodeBatch || [];
  const batchCount = batchItems.length;
  h+=`<div class="card" style="margin-bottom:1.25rem;padding:14px;border-color:var(--brand)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:14px;font-weight:600">🔍 Carga de stock por código de barras</div>
      ${batchCount>0?`<button onclick="stockBatchClear()" style="padding:4px 10px;border-radius:6px;border:0.5px solid #ef4444;background:#fff;color:#ef4444;font-size:12px;cursor:pointer;font-family:inherit">✕ Limpiar</button>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="barcode-scanner-input" placeholder="Escaneá o escribí el código y presioná Enter..."

        style="flex:1;padding:8px 12px;border:0.5px solid var(--border);border-radius:8px;font-family:monospace;font-size:14px;background:var(--bg)"
        onkeydown="if(event.key==='Enter'){stockBatchScan(this.value);this.value='';}"
      >
      <div style="font-size:12px;color:var(--muted);white-space:nowrap">${batchCount} producto${batchCount!==1?'s':''}</div>
    </div>`;

  // Lista de productos escaneados
  if(batchCount>0){
    h+=`<div style="margin-top:10px;border:0.5px solid var(--border);border-radius:8px;overflow:hidden">`;
    h+=`<div style="display:grid;grid-template-columns:1fr 60px 100px 32px;gap:8px;padding:6px 10px;background:#f8f7f4;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">
      <span>Producto</span><span style="text-align:center">Stock actual</span><span style="text-align:center">Ajuste</span><span></span>
    </div>`;
    batchItems.forEach((item,idx)=>{
      const col=item.delta>0?'#065f46':'#b91c1c';
      const bg=item.delta>0?'#f0fdf4':'#fff8f8';
      h+=`<div style="display:grid;grid-template-columns:1fr 60px 100px 32px;gap:8px;padding:8px 10px;border-top:0.5px solid var(--border);align-items:center;background:${bg}">
        <div>
          <div style="font-size:13px;font-weight:600">${item.name}</div>
          <div style="font-size:11px;color:var(--muted)">${item.barcode}</div>
        </div>
        <div style="text-align:center;font-size:13px;font-weight:600">${item.currentStock} ${item.unit||'u'}</div>
        <div style="display:flex;align-items:center;gap:4px;justify-content:center">
          <button onclick="stockBatchDelta(${idx},-1)" style="width:24px;height:24px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;line-height:1">−</button>

          <button onclick="stockBatchDelta(${idx},1)" style="width:24px;height:24px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;line-height:1">+</button>
        </div>
        <button onclick="stockBatchRemove(${idx})" style="width:24px;height:24px;border-radius:4px;border:none;background:#fee2e2;color:#b91c1c;cursor:pointer;font-size:12px;line-height:1">✕</button>
      </div>`;

    h+=`</div>`;
    h+=`<div style="margin-top:10px;display:flex;justify-content:flex-end">
      <button onclick="stockBatchApply()" style="padding:10px 24px;border-radius:8px;border:none;background:var(--brand);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">✓ Confirmar actualización (${batchCount})</button>
    </div>`;
  }
  h+=`</div>`;

  // ── Métricas ──
  const allItems=[
    ...ings.map(i=>({stock:i.stock||0,alertAt:i.alertAt})),
    ...directStockDishes.map(d=>({stock:d.stock||0,alertAt:d.alertAt}))

        <span style="font-size:18px;font-weight:700;color:${col}">${stock}</span>

        <input id="restock-${src?'dish-':''}${id}" type="number" step="${src?'1':'0.1'}" placeholder="0" style="width:50px;padding:4px 6px;border:0.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;text-align:center">

      </div>
    </div>`;

  h+=`<div class="card" style="text-align:center;padding:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">✅ OK</div><div style="font-size:28px;font-weight:700;color:#065f46">${cntOk}</div></div>`;
  h+=`<div class="card" style="text-align:center;padding:14px;${cntLow>0?'border-color:#fcd34d;background:#fffbeb':''}"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">⚠️ Stock bajo</div><div style="font-size:28px;font-weight:700;color:${cntLow>0?'#92400e':'var(--muted)'}">${cntLow}</div></div>`;
  h+=`<div class="card" style="text-align:center;padding:14px;${cntEmpty>0?'border-color:#fca5a5;background:#fff8f8':''}"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">🔴 Sin stock</div><div style="font-size:28px;font-weight:700;color:${cntEmpty>0?'#b91c1c':'var(--muted)'}">${cntEmpty}</div></div>`;

// ── INGREDIENT ACTIONS ────────────────────────────
window.toggleStockEdit=(key,src)=>{
  if(!C._stockEdit) C._stockEdit={};
  // key puede ser dishKey o dishKey__typeName para filas de tipo
  const storeKey=src==='__type__'?`dishes-${key}`:`${src}-${key}`;
  const opening=!C._stockEdit[storeKey];
  C._stockEdit[storeKey]=opening;
  if(opening){
    if(!C._stockEditData) C._stockEditData={};
    if(!C._stockEditData[storeKey]) C._stockEditData[storeKey]={};
    // Inicializar barcodes desde DB
    if(key.includes('__')){
      // Fila de tipo
      const [dishId,typeName]=key.split('__');
      const dish=DB.dishes[dishId]||{};
      const t=(dish.types||[]).find(t2=>(typeof t2==='string'?t2:t2.name)===typeName);
      if(t&&typeof t==='object'){
        const bs=t.barcodes?[...t.barcodes]:(t.barcode?[t.barcode]:[]);
        C._stockEditData[storeKey].barcodes=[...new Set(bs.filter(Boolean))];
      } else {
        C._stockEditData[storeKey].barcodes=[];
      }
    } else {
      const dbObj=src==='dishes'?DB.dishes:src==='cafeteria'?DB.cafeteriaItems:DB.kioskItems;
      const item=dbObj[key]||{};
      if(!('alertAt' in C._stockEditData[storeKey]))C._stockEditData[storeKey].alertAt=item.alertAt!=null?item.alertAt:'';
      if(!('barcodes' in C._stockEditData[storeKey])){
        let bs=[];
        if(item.barcodes&&item.barcodes.length>0)bs=[...item.barcodes];
        else if(item.barcode)bs=[item.barcode];
        C._stockEditData[storeKey].barcodes=[...new Set(bs.filter(Boolean))];
      }
    }
  }
  render();
  setTimeout(()=>{
    const inp=document.getElementById(`new-barcode-${src}-${key}`)
      ||document.getElementById(`new-bc-type-${key.split('__')[0]}-${key.includes('__')?'x':''}`);
    if(inp)inp.focus();
  },50);
};
// Type row barcode actions
window.typeRowAddBarcode=async(dishId,typeIdx,storeKey)=>{
  const inp=document.getElementById(`new-bc-type-${dishId}-${typeIdx}`);
  if(!inp||!inp.value.trim())return;
  const bc=inp.value.trim();
  const dish=DB.dishes[dishId];if(!dish||!dish.types||!dish.types[typeIdx])return;
  const updatedTypes=[...dish.types];
  if(typeof updatedTypes[typeIdx]==='string')updatedTypes[typeIdx]={name:updatedTypes[typeIdx],priceMode:'base'};
  const t=updatedTypes[typeIdx];
  const bcs=t.barcodes?[...t.barcodes]:(t.barcode?[t.barcode]:[]);
  if(!bcs.includes(bc))bcs.push(bc);
  updatedTypes[typeIdx]={...t,barcodes:bcs,barcode:null};
  await update(ref(db,`dishes/${dishId}`),{types:updatedTypes});
  // Update local state
  if(C._stockEditData&&C._stockEditData[storeKey]){
    C._stockEditData[storeKey].barcodes=bcs;
  }
  inp.value='';render();
  setTimeout(()=>{const i2=document.getElementById(`new-bc-type-${dishId}-${typeIdx}`);if(i2)i2.focus();},50);
};
window.typeRowRemoveBarcode=async(dishId,typeIdx,bcIdx)=>{
  const dish=DB.dishes[dishId];if(!dish||!dish.types||!dish.types[typeIdx])return;
  const updatedTypes=[...dish.types];
  const t=updatedTypes[typeIdx];
  const bcs=[...(t.barcodes||[])];
  bcs.splice(bcIdx,1);
  updatedTypes[typeIdx]={...t,barcodes:bcs};
  await update(ref(db,`dishes/${dishId}`),{types:updatedTypes});
  render();
};
window.typeRowSave=async(dishId,typeIdx,storeKey)=>{
  const dish=DB.dishes[dishId];if(!dish||!dish.types||!dish.types[typeIdx])return;
  // Stock already saved live via updateTypeStockDirect
  // Just close the editor
  if(C._stockEdit)C._stockEdit[storeKey]=false;
  if(C._stockEditData)delete C._stockEditData[storeKey];
  render();
};

window.stockDirectUpdate=(key,src,field,val)=>{
  // Guardar temporalmente en C para no perder cambios al re-render
  if(!C._stockEditData) C._stockEditData={};
  const k=`${src}-${key}`;
  if(!C._stockEditData[k]) C._stockEditData[k]={};
  C._stockEditData[k][field]=val;
};

window.stockDirectSave=async(key,src)=>{
  const k=`${src}-${key}`;
  const data=(C._stockEditData||{})[k]||{};
  const dbPath=src==='dishes'?'dishes':src==='cafeteria'?'cafeteriaItems':'kioskItems';
  const dbObj=src==='dishes'?DB.dishes:src==='cafeteria'?DB.cafeteriaItems:DB.kioskItems;
  const item=dbObj[key]||{};
  const updates={};
  // Siempre guardar alertAt (del estado o del DB)
  const alertVal='alertAt' in data?data.alertAt:item.alertAt;
  updates.alertAt=alertVal===''||alertVal==null?null:Number(alertVal);
  // Siempre guardar barcodes (del estado o del DB)
  const bcsRaw='barcodes' in data?data.barcodes:(()=>{const bs=[];if(item.barcodes&&item.barcodes.length>0)bs.push(...item.barcodes);else if(item.barcode)bs.push(item.barcode);return bs;})();
  const bcs=[...new Set(bcsRaw.filter(b=>b&&b.trim()))];
  updates.barcodes=bcs;
  updates.barcode=null;
  await update(ref(db,`${dbPath}/${key}`),updates);
  if(C._stockEdit) C._stockEdit[k]=false;
  if(C._stockEditData) delete C._stockEditData[k];
  render();
};

function _getBarcodes(key,src){
  const k=`${src}-${key}`;
  // Si ya hay estado temporal, usarlo directamente
  if(C._stockEditData&&C._stockEditData[k]&&'barcodes' in C._stockEditData[k])
    return [...C._stockEditData[k].barcodes];
  // Si no, construir desde DB sin duplicados
  const dbObj=src==='dishes'?DB.dishes:src==='cafeteria'?DB.cafeteriaItems:DB.kioskItems;
  const item=dbObj[key]||{};
  const bs=[];
  if(item.barcode&&!bs.includes(item.barcode))bs.push(item.barcode);
  if(item.barcodes)item.barcodes.forEach(b=>{if(b&&!bs.includes(b))bs.push(b);});
  return bs;
}

window.stockDirectAddBarcode=(key,src)=>{
  const inp=document.getElementById(`new-barcode-${src}-${key}`);
  const val=(inp?inp.value:'').trim();
  if(!val)return;
  const k=`${src}-${key}`;
  if(!C._stockEditData)C._stockEditData={};
  if(!C._stockEditData[k])C._stockEditData[k]={};
  const current=_getBarcodes(key,src);
  if(!current.includes(val))current.push(val);
  C._stockEditData[k].barcodes=[...current];
  // Re-render solo el form sin perder foco
  render();
  setTimeout(()=>{const i=document.getElementById(`new-barcode-${src}-${key}`);if(i){i.value='';i.focus();}},30);
};

window.stockDirectRemoveBarcode=(key,src,idx)=>{
  const k=`${src}-${key}`;
  if(!C._stockEditData)C._stockEditData={};
  if(!C._stockEditData[k])C._stockEditData[k]={};
  const current=[..._getBarcodes(key,src)];
  current.splice(idx,1);
  C._stockEditData[k].barcodes=current;
  render();
};
