function renderMenuOnly(mc){
  const cats=getCats();
  const allDishes=Object.entries(DB.dishes).map(([k,v])=>({...v,_key:k})).filter(d=>!d.unavailable);
  const allCafItems=Object.entries(DB.cafeteriaItems||{}).map(([k,v])=>({...v,_key:k})).filter(d=>!d.unavailable);

  // Mostrar spinner mientras Firebase no cargó
  if(firstLoad||allDishes.length===0&&Object.keys(DB.dishes).length===0){
    mc.innerHTML=`<div class="content"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px">
      <div class="spinner"></div>
      <div style="font-size:14px;color:var(--muted)">Cargando carta...</div>
    </div></div>`;
    return;
  }
  const hasCaf=allCafItems.length>0;
  const section=C.customerMenuSection||'platos';

  // Auto-seleccionar primera categoría siempre
  if(section==='platos'){
    const firstCat=cats.find(c=>!c.isPromo&&allDishes.some(d=>d.cat===c._key));
    if(!C.customerCat||C.customerCat==='todos'||!cats.find(c=>c._key===C.customerCat))
      if(firstCat)C.customerCat=firstCat._key;
  }

  let h='<div class="content"><div style="max-width:600px;margin:0 auto">';

  // Header
  h+=`<div style="padding:1rem 0 .5rem;text-align:center"><div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--text)">TTR Bar Club</div><div style="font-size:13px;color:var(--muted);margin-top:2px">Carta</div></div>`;

  // Tabs Restaurant / Cafetería
  if(hasCaf){
    h+=`<div style="display:flex;background:#f3f4f6;border-radius:10px;padding:3px;gap:2px;margin:10px 0;width:fit-content">`;
    h+=`<button onclick="setMenuSection('platos')" style="padding:6px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:${section==='platos'?'#fff':'transparent'};color:${section==='platos'?'var(--text)':'var(--muted)'}">🍽 Restaurant</button>`;
    h+=`<button onclick="setMenuSection('cafeteria')" style="padding:6px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:${section==='cafeteria'?'#fff':'transparent'};color:${section==='cafeteria'?'var(--text)':'var(--muted)'}">☕ Cafetería</button>`;
    h+=`</div>`;
  }

  if(section==='cafeteria'){
    const cafCats=getCafCats().filter(c=>allCafItems.some(d=>d.cat===c._key));
    if(!C.cafCat||C.cafCat==='todos'||!cafCats.find(c=>c._key===C.cafCat))
      if(cafCats.length)C.cafCat=cafCats[0]._key;
    h+=`<div class="cat-tabs">`;
    cafCats.forEach(c=>{h+=`<button class="cat-tab${C.cafCat===c._key?' active':''}" onclick="setCafCat('${c._key}')"><span class="cat-emoji">${c.icon}</span>${c.label}</button>`;});
    h+=`</div><div class="menu-grid">`;
    const filtered=C.cafCat?allCafItems.filter(d=>d.cat===C.cafCat):allCafItems;
    filtered.forEach(d=>{
      h+=`<div class="menu-card">`;
      h+=`<div class="menu-card-name">${d.emoji||'☕'} ${d.name}</div>`;
      if(d.desc)h+=`<div class="menu-card-desc">${d.desc}</div>`;
      h+=`<div class="menu-card-footer"><span class="menu-card-price">$${Number(d.price).toLocaleString()}</span></div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  } else {
    const allCatIds=cats.map(c=>c._key).filter(id=>allDishes.some(d=>d.cat===id));
    h+=`<div class="cat-tabs">`;
    allCatIds.forEach(cid=>{
      const cat=cats.find(c=>c._key===cid);
      const isP=cat&&cat.isPromo;
      h+=`<button class="cat-tab${C.customerCat===cid?' active':''}${isP?' promo-tab':''}" onclick="setMenuOnlyCat('${cid}')"><span class="cat-emoji">${cat?cat.icon:'🍽'}</span>${cat?cat.label:cid}</button>`;
    });
    h+=`</div><div class="menu-grid">`;
    const filtered=C.customerCat?allDishes.filter(d=>d.cat===C.customerCat):allDishes;    filtered.forEach(d=>{
      const dishCat=cats.find(c=>c._key===d.cat);
      const isP=dishCat&&dishCat.isPromo&&(d.promoDiscount>0||d.is2x1);
      const fp=dishFinalPrice(d,1);
      h+=`<div class="menu-card${isP?' promo-card':''}">`;
      if(isP)h+=`<div style="margin-bottom:6px"><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:#fff7ed;color:#c2410c;border:0.5px solid #fed7aa">🔥 PROMO DEL DÍA</span></div>`;
      h+=`<div class="menu-card-name">${d.name}</div>`;
      if(d.desc)h+=`<div class="menu-card-desc">${d.desc}</div>`;
      if(d.is2x1)h+=`<div style="font-size:11px;color:#92400e;background:#fff7ed;border-radius:5px;padding:2px 8px;display:inline-block;margin-bottom:6px;border:0.5px solid #fed7aa">🎁 Llevá 2, pagá 1</div>`;
      if(d.hasTypes&&(d.types||[]).length>0){
        h+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">`;
        (d.types||[]).forEach(t=>{const tn=typeof t==='string'?t:t.name;h+=`<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:#f3f4f6;color:#374151;border:0.5px solid #e5e7eb">${tn}</span>`;});
        h+=`</div>`;
      }
      if(d.customizable&&(d.ingredients||[]).length>0)h+=`<div style="font-size:11px;color:#5b21b6;background:#ede9fe;border-radius:5px;padding:2px 7px;display:inline-block;margin-bottom:6px">🧩 Personalizable</div>`;
      h+=`<div class="menu-card-footer">`;
      h+=`<div>${d.isMitadMitad?'<span style="font-size:11px;color:var(--muted)">A definir</span>':(isP&&!d.is2x1?`<span class="menu-card-price-original">$${d.price.toLocaleString()}</span> `:'')+`<span class="menu-card-price">$${fp.toLocaleString()}</span>`}</div>`;
      h+=`</div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div style="text-align:center;padding:2rem 0 1rem;font-size:11px;color:#9ca3af;letter-spacing:.03em">© 2026 SolDougan</div>`;
  h+=`</div></div>`;
  mc.innerHTML=h;
}

function renderMenuWithCart(mc){
  const table=DB.tables[C.customerTableId];
  const isIndividual=C.orderMode==='individual';
  const section=C.customerMenuSection||'platos'; // 'platos', 'cafeteria' o 'kiosko'
  const ct=cartCount();

  // ── Selector de sección ──
  const hasCafItems=Object.values(DB.cafeteriaItems||{}).some(d=>!d.unavailable);
  const hasCafCats=Object.keys(DB.cafeteriaCategories||{}).length>0;
  const showCafSwitch=hasCafCats||hasCafItems;
  const tableData=DB.tables[C.customerTableId]||{};
  const showKiosko=tableData.showKiosko&&Object.keys(DB.kioskItems||{}).length>0;
  const showSwitch=showCafSwitch||showKiosko;

  let menuH=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap"><div style="font-size:14px;color:var(--muted)"><strong style="color:var(--text)">${table?table.label:''}</strong>${isIndividual?`<span class="order-type-chip ot-individual" style="margin-left:6px">👤 ${C.customerName}</span>`:`<span class="order-type-chip ot-general" style="margin-left:6px">👥 General</span>`}</div></div>`;

  // Selector Restaurant / Cafetería / Kiosko
  if(showSwitch){
    const btnStyle=(active)=>`padding:7px 14px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:${active?'#fff':'transparent'};color:${active?'var(--text)':'var(--muted)'};box-shadow:${active?'0 1px 4px rgba(0,0,0,0.1)':'none'};transition:all 0.15s`;
    menuH+=`<div style="display:flex;background:#f3f4f6;border-radius:10px;padding:3px;gap:2px;margin-bottom:1rem;width:fit-content">
      <button onclick="setMenuSection('platos')" style="${btnStyle(section==='platos')}">🍽 Restaurant</button>
      ${showCafSwitch?`<button onclick="setMenuSection('cafeteria')" style="${btnStyle(section==='cafeteria')}">☕ Cafetería</button>`:''}
      ${showKiosko?`<button onclick="setMenuSection('kiosko')" style="${btnStyle(section==='kiosko')}">🏪 Kiosko</button>`:''}
    </div>`;
  }

  if(section==='cafeteria'){
    renderCafeteriaMenu(mc, menuH, ct, isIndividual);
    return;
  }

  if(section==='kiosko'){
    renderKioskoMenuCust(mc, menuH, ct, isIndividual);
    return;
  }

  // ── Sección Platos (Restaurant) ──
  const allDishes=Object.entries(DB.dishes).map(([k,v])=>({...v,_key:k}));
  const dishes=allDishes.filter(d=>!d.unavailable);
  const cats=getCats();
  const allCatIds=[...cats.map(c=>c._key)].filter(id=>dishes.some(d=>d.cat===id));
  // Auto-seleccionar primera categoría siempre
  if(!C.customerCat||C.customerCat==='todos'||!allCatIds.includes(C.customerCat)){
    const firstCat=cats.find(c=>!c.isPromo&&allCatIds.includes(c._key));
    if(firstCat)C.customerCat=firstCat._key;
  }
  const filtered=dishes.filter(d=>d.cat===C.customerCat);
  const tabLabel=id=>{
    const cat=cats.find(c=>c._key===id);if(!cat)return id;
    const cnt=dishes.filter(d=>d.cat===id).length;
    return cat.isPromo?`${cat.icon} ${cat.label}${cnt>0?` (${cnt})`:''}`:cat.icon+' '+cat.label;
  };
  menuH+=`<div class="cat-tabs">`;
  allCatIds.forEach(c=>{
    const cat=cats.find(x=>x._key===c);
    const isP=cat&&cat.isPromo;
    const _tabParts=tabLabel(c).split(' ');const _tabEmoji=_tabParts[0];const _tabName=_tabParts.slice(1).join(' ')||_tabParts[0];
    menuH+=`<button class="cat-tab${C.customerCat===c?' active':''}${isP?' promo-tab':''}" onclick="setCat('${c}')"><span class="cat-emoji">${_tabEmoji}</span>${_tabName}</button>`;
  });
  menuH+=`</div>`;

  if(C.custDishId!==null){
    const d=DB.dishes[C.custDishId];
    if(d){
      const excl=(C.cart[C.custDishId]&&C.cart[C.custDishId].excluded)||new Set();
      menuH+=`<div class="cust-modal"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:20px">${(cats.find(c=>c._key===d.cat)||{}).icon||'🍽'}</span><div><div style="font-size:16px;font-weight:500">${d.name}</div><div style="font-size:12px;color:var(--muted)">Destildá lo que no querés</div></div></div><div class="cust-ing-list">`;
      (d.ingredients||[]).forEach(ing=>{const ex=excl.has(ing);menuH+=`<div class="cust-ing-row${ex?' excluded':''}" onclick="toggleIng('${C.custDishId}','${ing.replace(/'/g,"\\'")}')"><div style="display:flex;align-items:center;gap:8px"><div class="cust-check ${ex?'unchecked':'checked'}">${ex?'':'✓'}</div><span class="${ex?'strikethrough':''}">${ing}</span></div>${ex?`<span style="font-size:11px;color:#b45309">Sin esto</span>`:''}</div>`;});
      menuH+=`</div><div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="confirmCust('${C.custDishId}')">Agregar al pedido</button><button class="btn btn-ghost" onclick="cancelCust()">Cancelar</button></div></div>`;
    }
  }

  menuH+=`<div class="menu-grid">`;
  filtered.forEach(d=>{
    const entry=C.cart[d._key];const q=entry?entry.qty:0;const excl=entry?entry.excluded:new Set();
    const fp=d.isMitadMitad?null:dishFinalPrice(d,q||1);const dishCat=cats.find(c=>c._key===d.cat);
    const isPromoCat=dishCat&&dishCat.isPromo;
    const is2x1=isPromoCat&&d.is2x1;
    const isP=isPromoCat&&(d.promoDiscount>0||is2x1);
    const promoChip=is2x1?`<span style="font-size:10px;font-weight:600;color:#c2410c;margin-left:4px;background:#fff7ed;border:0.5px solid #fed7aa;border-radius:4px;padding:1px 6px">2x1</span>`:(d.promoDiscount>0?`<span style="font-size:10px;font-weight:600;color:#c2410c;margin-left:4px">-${d.promoDiscount}%</span>`:'');
    const r=DB.ratings[d.name];const avg=r&&r.count>0?r.total/r.count:null;
    const typePickerOpen=C.typePickerDishId===d._key;

    if(d.isMitadMitad&&d.mitadMitadCat){
      // Mitad y mitad card
      const _isOpen=C.custMitadDishId===d._key;
      const _mmEntries=Object.entries(C.cart).filter(([k])=>k.startsWith('mitad|'+d._key+'|'));
      menuH+=`<div class="menu-card">`;
      menuH+=`<div class="menu-card-name">${d.name}</div>`;
      if(d.desc)menuH+=`<div class="menu-card-desc">${d.desc}</div>`;
      _mmEntries.forEach(([k,v])=>{menuH+=`<div style="font-size:11px;color:var(--muted);margin-top:2px">🍕 ${v._mitadName||''}</div>`;});
      menuH+=`<div class="menu-card-footer"><span style="font-size:11px;color:var(--muted)">A definir</span><button class="add-btn" onclick="custOpenMitad('${d._key}')">+</button></div>`;
      if(_isOpen){
        const _opts=Object.entries(DB.dishes).map(([k,v])=>({...v,_key:k})).filter(dd=>dd.cat===d.mitadMitadCat&&!dd.unavailable).sort((a,b)=>a.name.localeCompare(b.name,'es'));
        const _s=C.custMitadStep||1;
        const _m1=C.custMitad1?_opts.find(dd=>dd._key===C.custMitad1):null;
        const _m2=C.custMitad2?_opts.find(dd=>dd._key===C.custMitad2):null;
        const _price=_m1&&_m2?Math.max(Number(_m1.price),Number(_m2.price)):null;
        menuH+=`<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)">
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <div style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid ${_m1?'var(--accent)':'var(--border)'};background:${_m1?'#fff5f7':'var(--bg)'};font-size:12px;text-align:center">
              <div style="font-size:10px;color:var(--muted)">1° mitad</div>
              <div style="font-weight:600">${_m1?_m1.name:'—'}</div>
            </div>
            <div style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid ${_m2?'var(--accent)':'var(--border)'};background:${_m2?'#fff5f7':'var(--bg)'};font-size:12px;text-align:center">
              <div style="font-size:10px;color:var(--muted)">2° mitad</div>
              <div style="font-weight:600">${_m2?_m2.name:'—'}</div>
            </div>
          </div>
          <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px">Elegí la ${_s===1?'primera':'segunda'} mitad:</div>
          <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px">
            ${_opts.map(dd=>{const _sel=(_s===1&&C.custMitad1===dd._key)||(_s===2&&C.custMitad2===dd._key);return `<button onclick="custMitadPick('${dd._key}')" style="padding:8px 12px;border-radius:8px;border:1.5px solid ${_sel?'var(--accent)':'var(--border)'};background:${_sel?'#fff5f7':'var(--card)'};font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center"><span>${dd.name}</span><span style="color:var(--accent)">$${Number(dd.price).toLocaleString()}</span></button>`;}).join('')}
          </div>
          ${_price!==null?`<div style="text-align:center;font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px">Total: $${_price.toLocaleString()}</div>`:''}
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" style="flex:1;font-size:13px" ${_m1&&_m2?'':'disabled'} onclick="custConfirmMitad('${d._key}')">Agregar al pedido</button>
            <button class="btn btn-ghost" style="font-size:13px" onclick="custCancelMitad()">Cancelar</button>
          </div>
        </div>`;
      }
      menuH+=`</div>`;
    } else {
      const avTypes=d.hasTypes?availableTypes(d):[];
      menuH+=`<div class="menu-card${isP?' promo-card':''}">`;
      if(isP)menuH+=`<div style="margin-bottom:6px"><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:#fff7ed;color:#c2410c;border:0.5px solid #fed7aa">🔥 PROMO DEL DÍA</span></div>`;
      menuH+=`<div class="menu-card-name">${d.name}</div>`;
      if(avg)menuH+=`<div style="display:flex;align-items:center;gap:3px;margin-bottom:4px">${starsHtml(avg,11)}<span style="font-size:11px;color:var(--muted);margin-left:2px">${avg.toFixed(1)}</span></div>`;
      if(d.desc)menuH+=`<div class="menu-card-desc">${d.desc}</div>`;
      if(is2x1)menuH+=`<div style="font-size:11px;color:#92400e;background:#fff7ed;border-radius:5px;padding:2px 8px;display:inline-block;margin-bottom:6px;border:0.5px solid #fed7aa">🎁 Llevá 2, pagá 1</div>`;
      if(d.customizable&&(d.ingredients||[]).length>0)menuH+=`<div style="font-size:11px;color:#5b21b6;background:#ede9fe;border-radius:5px;padding:2px 7px;display:inline-block;margin-bottom:6px">🧩 Personalizable</div>`;
      if(excl&&excl.size>0)menuH+=`<div class="excl-note">Sin: ${[...excl].join(', ')}</div>`;
      if(typePickerOpen&&avTypes.length>0){
        menuH+=`<div style="margin:8px 0;padding:10px;background:var(--bg);border-radius:10px;border:0.5px solid var(--border)">`;
        menuH+=`<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">Elegí el tipo:</div>`;
        menuH+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">`;
        avTypes.forEach(t=>{
          const tname=typeof t==='string'?t:t.name;
          const tp=typeof t==='object'&&t.priceMode!=='base'?(t.priceMode==='extra'?'+$'+(t.priceExtra||0).toLocaleString():'$'+(t.priceVal||0).toLocaleString()):null;
          menuH+=`<button onclick="pickTypeByName('${tname.replace(/'/g,"\\'")}') " style="padding:8px 16px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">${tname}${tp?`<span style="font-size:11px;opacity:.75;margin-left:4px">${tp}</span>`:''}</button>`;
        });
        menuH+=`</div>`;
        menuH+=`<button class="btn btn-ghost btn-sm" onclick="closeTypePicker()">Cancelar</button>`;
        menuH+=`</div>`;
      } else if(typePickerOpen){
        menuH+=`<div style="font-size:13px;color:var(--muted);padding:8px 0">Sin stock disponible</div><button class="btn btn-ghost btn-sm" onclick="closeTypePicker()">Cerrar</button>`;
      }
      // Para platos con tipos, buscar entries en carrito por este plato
      const typeEntries=d.hasTypes?Object.entries(C.cart).filter(([k])=>k===d._key||k.startsWith(d._key+'|')):[];
      const totalTypeQty=typeEntries.reduce((s,[,v])=>s+v.qty,0);

      menuH+=`<div class="menu-card-footer">`;
      menuH+=`<div>${isP&&!is2x1?`<span class="menu-card-price-original">$${d.price.toLocaleString()}</span> `:''}<span class="menu-card-price">$${d.price.toLocaleString()}</span>${promoChip}</div>`;
      if(!typePickerOpen){
        if(d.hasTypes&&avTypes.length>0){
          // Mostrar qty total + siempre abrir picker para agregar más
          if(totalTypeQty>0){
            menuH+=`<div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:600;color:var(--accent)">${totalTypeQty}</span><button class="add-btn" onclick="openTypePicker('${d._key}')">+</button></div>`;
          } else {
            menuH+=`<button class="add-btn" onclick="openTypePicker('${d._key}')">+</button>`;
          }
        } else {
          const addOnclick=d.customizable&&(d.ingredients||[]).length>0?`openCust('${d._key}')`:`quickAdd('${d._key}')`;
          menuH+=q===0?`<button class="add-btn" onclick="${addOnclick}">+</button>`:`<div class="qty-ctrl"><button class="qty-btn" onclick="removeFromCart('${d._key}')">−</button><span class="qty-val">${q}</span><button class="qty-btn" onclick="${addOnclick}">+</button></div>`;
        }
      }
      menuH+=`</div></div>`;
    }
  });
  menuH+=`</div>`;

  // Usar renderCartPanel para el carrito unificado (incluye items de cafetería)
  renderCartPanel(mc, menuH, ct, isIndividual, cats);
  updateTopbarCart();
}

// Preserva el scroll del cat-tabs y scroll vertical al re-renderizar el menú
function refreshMenuWithScroll(){
  const _sl=document.querySelector('.cat-tabs')?.scrollLeft||0;
  const _sy=window.scrollY;
  renderMenuWithCart(document.getElementById('main-content'));
  updateTopbarCart();
  requestAnimationFrame(()=>{
    const el=document.querySelector('.cat-tabs');if(el)el.scrollLeft=_sl;
    window.scrollTo({top:_sy,behavior:'instant'});
  });
}
function refreshMenuRenderWithScroll(){
  const _sl=document.querySelector('.cat-tabs')?.scrollLeft||0;
  render();
  requestAnimationFrame(()=>{const el=document.querySelector('.cat-tabs');if(el)el.scrollLeft=_sl;});
}
function scrollActiveCat(){
  requestAnimationFrame(()=>{
    const tabs=document.querySelector('.cat-tabs');
    const active=tabs&&tabs.querySelector('.cat-tab.active');
    if(!tabs||!active)return;
    // Scroll solo horizontal — sin tocar el scroll vertical de la página
    const tabsRect=tabs.getBoundingClientRect();
    const activeRect=active.getBoundingClientRect();
    const center=active.offsetLeft-(tabs.offsetWidth/2)+(active.offsetWidth/2);
    tabs.scrollLeft=center;
  });
}


window.openCust=id=>{C.custDishId=id;refreshMenuWithScroll();};
window.cancelCust=()=>{C.custDishId=null;refreshMenuWithScroll();};
window.openTypePicker=id=>{C.typePickerDishId=id;C.custDishId=null;refreshMenuWithScroll();};

window.custOpenMitad=id=>{C.custMitadDishId=id;C.custMitad1=null;C.custMitad2=null;C.custMitadStep=1;refreshMenuWithScroll();};
window.custMitadPick=id=>{
  if(C.custMitadStep===1){C.custMitad1=id;C.custMitadStep=2;}
  else{C.custMitad2=id;}
  renderMenuWithCart(document.getElementById('main-content'));
};
window.custConfirmMitad=dishId=>{
  const mm=DB.dishes[dishId];if(!mm)return;
  const d1=DB.dishes[C.custMitad1];const d2=DB.dishes[C.custMitad2];
  if(!d1||!d2){alert('Elegí las dos mitades');return;}
  const price=Math.max(Number(d1.price),Number(d2.price));
  const name=`${mm.name} — ${d1.name} / ${d2.name}`;
  const key=`mitad|${dishId}|${C.custMitad1}|${C.custMitad2}`;
  if(!C.cart[key])C.cart[key]={qty:0,_mitadName:name,_mitadPrice:price};
  C.cart[key].qty++;
  C.custMitadDishId=null;C.custMitad1=null;C.custMitad2=null;C.custMitadStep=1;
  renderMenuWithCart(document.getElementById('main-content'));
};
window.custCancelMitad=()=>{C.custMitadDishId=null;C.custMitad1=null;C.custMitad2=null;C.custMitadStep=1;refreshMenuWithScroll();};
window.pickType=idx=>{
  const d=DB.dishes[C.typePickerDishId];
  if(!d)return;
  const avTypes=availableTypes(d);
  if(!avTypes[idx])return;
  const typeName=typeof avTypes[idx]==='string'?avTypes[idx]:avTypes[idx].name;
  window.selectType(C.typePickerDishId,typeName);
};
window.pickTypeByName=typeName=>{
  window.selectType(C.typePickerDishId,typeName);
};
window.closeTypePicker=()=>{C.typePickerDishId=null;renderMenuWithCart(document.getElementById('main-content'));};
window.selectType=(dishId,typeName)=>{
  const d=DB.dishes[dishId];
  C.typePickerDishId=null;
  // Key compuesta por tipo — igual que mozas
  const cartKey=typeName?`${dishId}|${typeName}`:dishId;
  if(!C.cart[cartKey])C.cart[cartKey]={qty:0,excluded:new Set(),selectedType:typeName||null,_dishId:dishId};
  if(d&&d.customizable&&(d.ingredients||[]).length>0){
    // Abrir customizador — necesitamos que use la key compuesta
    C.custDishId=cartKey;
  } else {
    C.cart[cartKey].qty+=1;
  }
  refreshMenuWithScroll();
  if(document.getElementById('cart-sheet'))showCartSheet();
};
window.toggleIng=(dishId,ing)=>{if(!C.cart[dishId])C.cart[dishId]={qty:0,excluded:new Set()};if(!C.cart[dishId].excluded)C.cart[dishId].excluded=new Set();if(C.cart[dishId].excluded.has(ing))C.cart[dishId].excluded.delete(ing);else C.cart[dishId].excluded.add(ing);renderMenuWithCart(document.getElementById('main-content'));};
window.confirmCust=id=>{if(!C.cart[id])C.cart[id]={qty:0,excluded:new Set()};C.cart[id].qty+=1;C.custDishId=null;refreshMenuWithScroll();};
window.quickAdd=id=>{if(!C.cart[id])C.cart[id]={qty:0,excluded:new Set()};C.cart[id].qty+=1;refreshMenuWithScroll();if(document.getElementById('cart-sheet'))showCartSheet();};
window.quickAddTyped=id=>{if(C.cart[id])C.cart[id].qty+=1;refreshMenuWithScroll();if(document.getElementById('cart-sheet'))showCartSheet();};
window.removeFromCart=id=>{if(C.cart[id]){if(C.cart[id].qty>1)C.cart[id].qty--;else delete C.cart[id];}refreshMenuWithScroll();if(document.getElementById('cart-sheet'))showCartSheet();};
window.custAddMitad=key=>{if(C.cart[key])C.cart[key].qty++;refreshMenuWithScroll();};
window.setCat=c=>{C.customerCat=c;C.custDishId=null;C.typePickerDishId=null;const _sy=window.scrollY;renderMenuWithCart(document.getElementById('main-content'));updateTopbarCart();requestAnimationFrame(()=>{window.scrollTo({top:_sy,behavior:'instant'});scrollActiveCat();});};
window.setMenuOnlyCat=c=>{C.customerCat=c;const _sy=window.scrollY;renderMenuOnly(document.getElementById('main-content'));requestAnimationFrame(()=>{window.scrollTo({top:_sy,behavior:'instant'});scrollActiveCat();});};
window.setCafCat=c=>{C.cafCat=c;render();scrollActiveCat();};
window.setMenuSection=section=>{C.customerMenuSection=section;C.cafCat='todos';if(section!=='kiosko')C.kioskCat=null;C.custDishId=null;C._catScrollReset=true;render();scrollActiveCat();};
window.initCustomerCat=()=>{
  const cats=getCats();
  const allDishes=Object.values(DB.dishes);
  const availDishes=allDishes.filter(d=>!d.unavailable);
  const firstCatWithDishes=cats.find(c=>availDishes.some(d=>d.cat===c._key));
  if(C.customerCat==='todos'&&firstCatWithDishes) C.customerCat=firstCatWithDishes._key;
};
window.callWaiter=()=>{showWaiterModal();};
window.showWaiterModal=()=>{
  document.getElementById('waiter-modal')?.remove();
  const overlay=document.createElement('div');
  overlay.id='waiter-modal';
  // position:fixed no afecta el layout de la página
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0';
  overlay.innerHTML=`<div style="background:var(--card);border-radius:16px 16px 0 0;padding:1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-width:480px;box-shadow:0 -4px 24px rgba(0,0,0,0.15)">
    <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:22px;text-align:center;margin-bottom:4px">🛎</div>
    <div style="font-size:16px;font-weight:600;text-align:center;margin-bottom:4px">Llamar al mozo</div>
    <div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:14px">¿Necesitás algo en particular?</div>
    <textarea id="waiter-msg" placeholder="Ej: Traeme la cuenta, necesito servilletas... (opcional)" style="width:100%;min-height:72px;padding:10px;border:0.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;resize:none;box-sizing:border-box;outline:none;background:var(--bg)"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="document.getElementById('waiter-modal').remove()" style="flex:1;padding:13px;border-radius:10px;border:0.5px solid var(--border);background:transparent;font-family:inherit;font-size:14px;cursor:pointer;color:var(--muted)">Cancelar</button>
      <button onclick="confirmCallWaiter()" style="flex:2;padding:13px;border-radius:10px;border:none;background:var(--brand);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">Llamar al mozo</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  setTimeout(()=>document.getElementById('waiter-msg')?.focus(),100);
};
window.confirmCallWaiter=()=>{
  const msg=(document.getElementById('waiter-msg')?.value||'').trim();
  const tableObj=DB.tables[C.customerTableId];
  const label=tableObj?tableObj.label:'Mesa';
  const n=new Date();
  const time=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  const personName=C.orderMode==='individual'&&C.customerName?C.customerName:null;
  push(ref(db,'alerts'),{tableId:C.customerTableId,tableLabel:label,time,status:'pending',createdAt:Date.now(),...(personName?{personName}:{}),...(msg?{message:msg}:{})});
  document.getElementById('waiter-modal')?.remove();
  // Visual feedback
  document.querySelectorAll('button[onclick="callWaiter()"]').forEach(btn=>{
    const orig=btn.innerHTML;
    btn.innerHTML='✅ Mozo avisado';btn.style.background='#d1fae5';btn.style.borderColor='#10b981';btn.style.color='#065f46';btn.disabled=true;
    setTimeout(()=>{btn.innerHTML=orig;btn.style.background='#fef3c7';btn.style.borderColor='#f59e0b';btn.style.color='#92400e';btn.disabled=false;},4000);
  });
};
window.cancelCart=()=>{
  if(confirm('¿Cancelar el pedido? Se van a borrar todos los ítems del carrito.')){
    C.cart={};
    C.custDishId=null;
    C.typePickerDishId=null;
    renderMenuWithCart(document.getElementById('main-content'));
  }
};


// ── CAFETERÍA MENÚ COMENSAL ───────────────────────
function renderCafeteriaMenu(mc, menuH, ct, isIndividual){
  const allItems=Object.entries(DB.cafeteriaItems||{}).map(([k,v])=>({...v,_key:k,isCafeteria:true}));
  const items=allItems.filter(d=>!d.unavailable);
  const cats=getCafCats();
  const allCatIds=cats.map(c=>c._key).filter(id=>items.some(d=>d.cat===id));
  // Auto-seleccionar primera categoría siempre
  if(!C.cafCat||C.cafCat==='todos'||!allCatIds.includes(C.cafCat)){
    if(allCatIds.length)C.cafCat=allCatIds[0];
  }
  const filtered=C.cafCat?items.filter(d=>d.cat===C.cafCat):items;

  menuH+=`<div class="cat-tabs">`;
  allCatIds.forEach(cid=>{
    const cat=cats.find(x=>x._key===cid);
    if(!cat)return;
    menuH+=`<button class="cat-tab${C.cafCat===cid?' active':''}" onclick="setCafMenuCat('${cid}')"><span class="cat-emoji">${cat.icon}</span>${cat.label}</button>`;
  });
  menuH+=`</div><div class="menu-grid">`;

  filtered.forEach(d=>{
    const entry=C.cart[d._key];const q=entry?entry.qty:0;
    const excl=entry?entry.excluded:new Set();
    menuH+=`<div class="menu-card"><div class="menu-card-name">${d.emoji||'☕'} ${d.name}</div><div class="menu-card-desc">${d.desc||''}</div>
      ${excl&&excl.size>0?`<div class="excl-note">Sin: ${[...excl].join(', ')}</div>`:''}
      <div class="menu-card-footer"><div><span class="menu-card-price">$${Number(d.price).toLocaleString()}</span></div>
      ${q===0?`<button class="add-btn" onclick="${d.customizable&&(d.ingredients||[]).length>0?`openCafCust('${d._key}')`:`quickAddCaf('${d._key}')`}">+</button>`
        :`<div class="qty-ctrl"><button class="qty-btn" onclick="removeFromCartCaf('${d._key}')">−</button><span class="qty-val">${q}</span><button class="qty-btn" onclick="${d.customizable&&(d.ingredients||[]).length>0?`openCafCust('${d._key}')`:`quickAddCaf('${d._key}')`}">+</button></div>`}
      </div></div>`;
  });
  if(items.length===0)menuH+=`<div class="empty-state" style="grid-column:1/-1">No hay items disponibles en cafetería</div>`;
  menuH+=`</div>`;

  // Modal personalización cafetería
  if(C.cafCustId!==null){
    const d=DB.cafeteriaItems[C.cafCustId];
    if(d){
      const excl=(C.cart[C.cafCustId]&&C.cart[C.cafCustId].excluded)||new Set();
      menuH+=`<div class="cust-modal"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:20px">${d.emoji||'☕'}</span><div><div style="font-size:16px;font-weight:500">${d.name}</div><div style="font-size:12px;color:var(--muted)">Destildá lo que no querés</div></div></div><div class="cust-ing-list">`;
      (d.ingredients||[]).forEach(ing=>{const ex=excl.has(ing);menuH+=`<div class="cust-ing-row${ex?' excluded':''}" onclick="toggleCafIng('${C.cafCustId}','${ing.replace(/'/g,"\\'")}')"><div style="display:flex;align-items:center;gap:8px"><div class="cust-check ${ex?'unchecked':'checked'}">${ex?'':'✓'}</div><span class="${ex?'strikethrough':''}">${ing}</span></div>${ex?`<span style="font-size:11px;color:#b45309">Sin esto</span>`:''}</div>`;});
      menuH+=`</div><div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="confirmCafCust('${C.cafCustId}')">Agregar al pedido</button><button class="btn btn-ghost" onclick="cancelCafCust()">Cancelar</button></div></div>`;
    }
  }

  // Carrito (reutiliza el bloque del carrito normal)
  renderCartPanel(mc, menuH, ct, isIndividual, cats);
}

function renderKioskoMenuCust(mc, menuH, ct, isIndividual){
  const kioskCats=getKioskCats();

  // Items de kiosko con stock
  const kioskItems=Object.entries(DB.kioskItems||{}).map(([k,v])=>({...v,_key:k,_src:'kiosk'})).filter(d=>d.stock==null||d.stock>0);

  // Platos de restaurant con directStock (ej: Bebidas) — se muestran como extra
  const directStockCats=new Set(getCats().filter(c=>c.directStock).map(c=>c._key));
  const restaurantExtras=Object.entries(DB.dishes||{})
    .map(([k,v])=>({...v,_key:k,_src:'dish'}))
    .filter(d=>!d.unavailable&&directStockCats.has(d.cat)&&(d.stock==null||d.stock>0));

  const allItems=[...kioskItems,...restaurantExtras];

  // Categorías de kiosko que tienen items
  const catsWithItems=kioskCats.filter(c=>allItems.some(d=>d._src==='kiosk'&&d.cat===c._key));

  // Categorías de restaurant extra que aparecen en kiosko
  const extraRestCats=[...new Set(restaurantExtras.map(d=>d.cat))].map(catId=>{
    const cat=DB.categories?.[catId];
    return cat?{_key:catId,label:cat.label,icon:cat.icon||'🍽',_isRest:true}:null;
  }).filter(Boolean);

  // Total de tabs = kiosk cats + rest extra cats
  const allTabs=[...catsWithItems,...extraRestCats];

  // Si no hay tab con categorías, mostrar todo sin tabs
  const hasTabs=allTabs.length>0;

  // Auto-select first tab
  if(hasTabs&&(!C.kioskCat||!allTabs.find(c=>c._key===C.kioskCat)))
    C.kioskCat=allTabs[0]._key;

  if(hasTabs){
    menuH+=`<div class="cat-tabs">`;
    allTabs.forEach(c=>{menuH+=`<button class="cat-tab${C.kioskCat===c._key?' active':''}" onclick="setKioskCat('${c._key}')"><span class="cat-emoji">${c.icon}</span>${c.label}</button>`;});
    menuH+=`</div>`;
  }

  // Filtrar items según tab seleccionada
  let items;
  if(hasTabs&&C.kioskCat){
    const isRestCat=extraRestCats.find(c=>c._key===C.kioskCat);
    if(isRestCat){
      items=restaurantExtras.filter(d=>d.cat===C.kioskCat);
    } else {
      items=kioskItems.filter(d=>d.cat===C.kioskCat);
    }
  } else {
    items=allItems;
  }
  items=items.sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));

  menuH+=`<div class="menu-grid" id="kiosk-menu-grid">`;
  items.forEach(d=>{
    const isRest=d._src==='dish';
    const cartKey=isRest?`restk|${d._key}`:`kiosk|${d._key}`;
    const avTypes=isRest&&d.hasTypes?availableTypes(d):[];
    // Para platos con tipos, sumar qty por dishId|tipo (igual que sección Platos)
    const q=avTypes.length>0
      ? Object.entries(C.cart).filter(([k])=>k===d._key||k.startsWith(d._key+'|')).reduce((s,[,v])=>s+v.qty,0)
      : (C.cart[cartKey]?C.cart[cartKey].qty:0);
    const fp=isRest?dishFinalPrice(d,1):Number(d.price);
    const typePickerOpen=isRest&&C.typePickerDishId===d._key;

    menuH+=`<div class="menu-card">`;
    menuH+=`<div class="menu-card-name">🏪 ${d.name}</div>`;
    if(d.desc)menuH+=`<div class="menu-card-desc">${d.desc}</div>`;
    // Mostrar variantes disponibles como chips
    if(avTypes.length>0){
      menuH+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">`;
      avTypes.forEach(t=>{const tn=typeof t==='string'?t:t.name;menuH+=`<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:#f3f4f6;color:#374151;border:0.5px solid #e5e7eb">${tn}</span>`;});
      menuH+=`</div>`;
    }
    // Inline type picker
    if(typePickerOpen&&avTypes.length>0){
      menuH+=`<div style="margin:8px 0;padding:10px;background:var(--bg);border-radius:10px;border:0.5px solid var(--border)">`;
      menuH+=`<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">Elegí el tipo:</div>`;
      menuH+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">`;
      avTypes.forEach(t=>{
        const tname=typeof t==='string'?t:t.name;
        const tp=typeof t==='object'&&t.priceMode!=='base'?(t.priceMode==='extra'?'+$'+(t.priceExtra||0).toLocaleString():'$'+(t.priceVal||0).toLocaleString()):null;
        menuH+=`<button onclick="pickKioskType('${d._key}','${tname.replace(/'/g,"\\'")}')"
         style="padding:8px 16px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">
         ${tname}${tp?`<span style="font-size:11px;opacity:.75;margin-left:4px">${tp}</span>`:""}</button>`;
      });
      menuH+=`</div>`;
      menuH+=`<button class="btn btn-ghost btn-sm" onclick="closeKioskTypePicker()">Cancelar</button>`;
      menuH+=`</div>`;
    }
    menuH+=`<div class="menu-card-footer">`;
    menuH+=`<span class="menu-card-price">$${fp.toLocaleString()}</span>`;
    if(!typePickerOpen){
      if(avTypes.length>0){
        // Igual que sección Platos: mostrar qty total + siempre abrir picker
        if(q>0){
          menuH+=`<div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:600;color:var(--accent)">${q}</span><button class="add-btn" onclick="openKioskTypePicker('${d._key}')">+</button></div>`;
        } else {
          menuH+=`<button class="add-btn" onclick="openKioskTypePicker('${d._key}')">+</button>`;
        }
      } else {
        const addOnclick=`quickAddKioskItem('${d._key}','${d._src}')`;
        menuH+=q===0
          ?`<button class="add-btn" onclick="${addOnclick}">+</button>`
          :`<div class="qty-ctrl"><button class="qty-btn" onclick="removeKioskItem('${d._key}','${d._src}')">−</button><span class="qty-val">${q}</span><button class="qty-btn" onclick="${addOnclick}">+</button></div>`;
      }
    }
    menuH+=`</div></div>`;
  });
  if(items.length===0)menuH+=`<div class="empty-state" style="grid-column:1/-1">Sin items disponibles</div>`;
  menuH+=`</div>`;
  renderCartPanel(mc, menuH, cartCount(), isIndividual, []);
}
function refreshKioskoMenu(){
  const _sl=document.querySelector('.cat-tabs')?.scrollLeft||0;
  renderMenuWithCart(document.getElementById('main-content'));
  updateTopbarCart();
  requestAnimationFrame(()=>{
    const el=document.querySelector('.cat-tabs');if(el)el.scrollLeft=_sl;
    scrollActiveCat();
  });
}
window.setKioskSubTab=tab=>{C.kioskSubTab=tab;render();};
window.openKioskTypePicker=id=>{C.typePickerDishId=id;refreshKioskoMenu();};
window.closeKioskTypePicker=()=>{C.typePickerDishId=null;refreshKioskoMenu();};
window.pickKioskType=(dishId,typeName)=>{
  // Usa el mismo selectType que la sección Platos — key dishId|tipo en C.cart
  window.selectType(dishId,typeName);
  C.typePickerDishId=null;
  refreshKioskoMenu();
};
window.toggleKioskCatOpen=id=>{if(!C._kioskCatOpen)C._kioskCatOpen={};C._kioskCatOpen[id]=C._kioskCatOpen[id]===false?true:false;render();};
window.setKioskCat=c=>{C.kioskCat=c;C._catScrollReset=false;refreshKioskoMenu();scrollActiveCat();};
window.quickAddKioskItem=(id,src)=>{
  const k=(src==='dish'?'restk|':'kiosk|')+id;
  if(!C.cart[k])C.cart[k]={qty:0,_kioskKey:id,_src:src};
  C.cart[k].qty++;refreshKioskoMenu();if(document.getElementById('cart-sheet'))showCartSheet();
};
window.removeKioskItem=(id,src)=>{
  const k=(src==='dish'?'restk|':'kiosk|')+id;
  if(C.cart[k]){if(C.cart[k].qty>1)C.cart[k].qty--;else delete C.cart[k];}refreshKioskoMenu();if(document.getElementById('cart-sheet'))showCartSheet();
};
// Legacy — keep for existing refs
window.quickAddKiosk=id=>quickAddKioskItem(id,'kiosk');
window.removeFromCartKiosk=id=>removeKioskItem(id,'kiosk');

function renderCartPanel(mc, menuH, ct, isIndividual, cats){
  // Recalcular ct siempre para que refleje el estado actual del carrito
  ct=cartCount();
  // Carrito unificado
  const cartEntries=Object.entries(C.cart).filter(([,v])=>v.qty>0);
  const total=cartTotal();
  let cartH=`<div class="cart-header"><span>${isIndividual?C.customerName:'Pedido mesa'}</span>${ct>0?`<span class="cart-tag">${ct} ítem${ct>1?'s':''}</span>`:''}</div><div class="cart-body">`;
  if(cartEntries.length===0)cartH+=`<div class="cart-empty">Todavía no agregaste ningún plato.</div>`;
  else cartEntries.forEach(([id,v])=>{
    // Kiosko puro (no restaurant)
    if(id.startsWith('kiosk|')){
      const kd=DB.kioskItems[v._kioskKey];if(!kd)return;
      const kp=Number(kd.price);
      cartH+=`<div class="cart-item"><div style="font-size:16px;flex-shrink:0">🏪</div><div class="cart-item-info"><div class="cart-item-name">${kd.name}</div></div><div class="cart-qty"><button class="cqbtn" onclick="removeKioskItem('${v._kioskKey}','kiosk')">−</button><span class="cqval">${v.qty}</span><button class="cqbtn" onclick="quickAddKioskItem('${v._kioskKey}','kiosk')">+</button></div><div class="cart-item-price">$${(kp*v.qty).toLocaleString()}</div></div>`;
      return;
    }
    // Mitad y mitad
    if(id.startsWith('mitad|')){
      cartH+=`<div class="cart-item"><div style="font-size:16px;flex-shrink:0">🍕</div><div class="cart-item-info"><div class="cart-item-name">${v._mitadName||'Pizza M&M'}</div></div><div class="cart-qty"><button class="cqbtn" onclick="removeFromCart('${id}')">−</button><span class="cqval">${v.qty}</span><button class="cqbtn" onclick="custAddMitad('${id}')">+</button></div><div class="cart-item-price">$${((v._mitadPrice||0)*v.qty).toLocaleString()}</div></div>`;
      return;
    }
    // key puede ser dishId o dishId|tipo (igual que mozas)
    const baseId=id.includes('|')?id.split('|')[0]:id;
    const d=DB.dishes[baseId]||DB.cafeteriaItems[baseId];if(!d)return;
    const isCaf=!!DB.cafeteriaItems[baseId];
    const selType=v.selectedType||null;
    const fp=isCaf?Number(d.price):dishFinalPrice(d,v.qty,selType);
    const is2x1=!isCaf&&d.is2x1;
    const dishCat=!isCaf?(cats||getCats()).find(c=>c._key===d.cat):null;
    const is2x1Active=is2x1&&dishCat&&dishCat.isPromo&&v.qty>=2;
    const priceNote=is2x1Active?`<div style="font-size:11px;color:#c2410c">🎁 2x1 aplicado</div>`:'';
    const icon=isCaf?(d.emoji||'☕'):(((cats||getCats()).find(c=>c._key===d.cat)||{}).icon||'🍽');
    cartH+=`<div class="cart-item"><div style="font-size:16px;flex-shrink:0;color:var(--muted)">${icon}</div><div class="cart-item-info"><div class="cart-item-name">${d.name}${selType?` <span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:4px">${selType}</span>`:''}</div>${exclNote(v.excluded)} ${priceNote}</div><div class="cart-qty"><button class="cqbtn" onclick="${isCaf?`removeFromCartCaf('${baseId}')`:`removeFromCart('${id}')`}">−</button><span class="cqval">${v.qty}</span><button class="cqbtn" onclick="${isCaf?`quickAddCaf('${baseId}')`:`quickAddTyped('${id}')`}">+</button></div><div class="cart-item-price">$${(fp*v.qty).toLocaleString()}</div></div>`;
  });
  cartH+=`</div><div class="cart-footer">`;
  if(cartEntries.length>0){
    cartH+=`<div class="cart-total-row big"><span>Total</span><span>$${total.toLocaleString()}</span></div>
    <button class="btn btn-primary btn-block" style="margin-top:10px" onclick="placeOrder()">Confirmar pedido</button>
    <button class="btn btn-ghost btn-block" style="margin-top:6px;color:var(--danger);border-color:var(--danger)" onclick="cancelCart()">Cancelar pedido</button>`;
  }
  const recentCutoff=Date.now()-18*60*60*1000;
  const hasOrders=Object.values(DB.orders).some(o=>o.tableId===C.customerTableId&&o.status!=='cobrado'&&(o.createdAt||0)>=recentCutoff);
  if(hasOrders&&!C.billRequested)cartH+=`<button class="btn btn-outline btn-block" style="margin-top:8px" onclick="goToBill()">Solicitar la cuenta</button>`;
  else if(C.billRequested)cartH+=`<div style="margin-top:8px;padding:10px 14px;border-radius:8px;background:#f0fdf4;border:0.5px solid #86efac;color:#166534;font-size:13px;text-align:center">✓ Cuenta solicitada</div>`;
  cartH+=`<button onclick="callWaiter()" style="margin-top:8px;width:100%;padding:10px;border-radius:8px;border:0.5px solid #f59e0b;background:#fef3c7;color:#92400e;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">🛎 Llamar al mozo</button>`;
  cartH+=`</div>`;
  mc.innerHTML=`<div class="content" style="padding:0;max-width:none"><div class="menu-layout"><div class="menu-col">${menuH}<div style="text-align:center;padding:1.5rem 0 .5rem;font-size:11px;color:#9ca3af;letter-spacing:.03em">© 2026 SolDougan</div></div><div class="cart-col"><div class="cart-widget">${cartH}</div></div></div></div>${ct>0?`<div class="mobile-cart-bar"><div class="mobile-cart-bar-left"><span class="mobile-cart-badge">${ct}</span><span style="font-size:14px;font-weight:500">$${total.toLocaleString()}</span></div><button onclick="showCartSheet()" style="padding:10px 20px;border-radius:10px;border:none;background:#fff;color:var(--brand);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0">Ver carrito</button></div>`:''}`;
}

window.setCafMenuCat=c=>{C.cafCat=c;C.cafCustId=null;render();scrollActiveCat();};

window.showCartSheet=()=>{
  document.getElementById('cart-sheet')?.remove();
  const ct=cartCount();
  const total=cartTotal();
  const isIndividual=C.orderMode==='individual';
  const cartEntries=Object.entries(C.cart).filter(([,v])=>v.qty>0);
  const cats=getCats();
  const recentCutoff=Date.now()-18*60*60*1000;
  const hasOrders=Object.values(DB.orders).some(o=>o.tableId===C.customerTableId&&o.status!=='cobrado'&&(o.createdAt||0)>=recentCutoff);

  // Build items HTML
  let itemsH='';
  cartEntries.forEach(([id,v])=>{
    if(id.startsWith('kiosk|')){
      const kd=DB.kioskItems[v._kioskKey];if(!kd)return;
      const kp=Number(kd.price);
      itemsH+=`<div class="cart-item"><div style="font-size:16px;flex-shrink:0">🏪</div><div class="cart-item-info"><div class="cart-item-name">${kd.name}</div></div><div class="cart-qty"><button class="cqbtn" onclick="removeKioskItem('${v._kioskKey}','kiosk')">−</button><span class="cqval">${v.qty}</span><button class="cqbtn" onclick="quickAddKioskItem('${v._kioskKey}','kiosk')">+</button></div><div class="cart-item-price">$${(kp*v.qty).toLocaleString()}</div></div>`;
      return;
    }
    if(id.startsWith('mitad|')){
      itemsH+=`<div class="cart-item"><div style="font-size:16px;flex-shrink:0">🍕</div><div class="cart-item-info"><div class="cart-item-name">${v._mitadName||'Pizza M&M'}</div></div><div class="cart-qty"><button class="cqbtn" onclick="removeFromCart('${id}')">−</button><span class="cqval">${v.qty}</span><button class="cqbtn" onclick="custAddMitad('${id}')">+</button></div><div class="cart-item-price">$${((v._mitadPrice||0)*v.qty).toLocaleString()}</div></div>`;
      return;
    }
    const baseId=id.includes('|')?id.split('|')[0]:id;
    const d=DB.dishes[baseId]||DB.cafeteriaItems[baseId];if(!d)return;
    const isCaf=!!DB.cafeteriaItems[baseId];
    const selType=v.selectedType||null;
    const fp=isCaf?Number(d.price):dishFinalPrice(d,v.qty,selType);
    const icon=isCaf?(d.emoji||'☕'):((cats.find(c=>c._key===d.cat)||{}).icon||'🍽');
    const is2x1=!isCaf&&d.is2x1;
    const dishCat=!isCaf?cats.find(c=>c._key===d.cat):null;
    const is2x1Active=is2x1&&dishCat&&dishCat.isPromo&&v.qty>=2;
    itemsH+=`<div class="cart-item"><div style="font-size:16px;flex-shrink:0">${icon}</div><div class="cart-item-info"><div class="cart-item-name">${d.name}${selType?` <span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:1px 6px;border-radius:4px">${selType}</span>`:''}</div>${exclNote(v.excluded)}${is2x1Active?`<div style="font-size:11px;color:#c2410c">🎁 2x1 aplicado</div>`:''}</div><div class="cart-qty"><button class="cqbtn" onclick="${isCaf?`removeFromCartCaf('${baseId}')`:`removeFromCart('${id}')`}">−</button><span class="cqval">${v.qty}</span><button class="cqbtn" onclick="${isCaf?`quickAddCaf('${baseId}')`:`quickAddTyped('${id}')`}">+</button></div><div class="cart-item-price">$${(fp*v.qty).toLocaleString()}</div></div>`;
  });

  const overlay=document.createElement('div');
  overlay.id='cart-sheet';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:600;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML=`<div style="background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:0.5px solid var(--border)">
      <div style="font-size:15px;font-weight:600">${isIndividual?C.customerName:'Pedido mesa'} <span style="font-size:13px;font-weight:400;color:var(--muted);margin-left:4px">${ct} ítem${ct!==1?'s':''}</span></div>
      <button onclick="document.getElementById('cart-sheet').remove()" style="border:none;background:var(--bg);border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)">✕</button>
    </div>

window.placeOrder=()=>{
  if(cartCount()===0)return;
  const items=Object.entries(C.cart).map(([id,v])=>{
    if(id.startsWith('kiosk|')||id.startsWith('restk|')){const isRest=id.startsWith('restk|');const kd=isRest?DB.dishes[v._kioskKey]:DB.kioskItems[v._kioskKey];if(!kd)return null;const kp=isRest&&v._typeName?dishFinalPrice(kd,v.qty,v._typeName):isRest?dishFinalPrice(kd,v.qty):Number(kd.price);const kname=v._typeName?kd.name+' — '+v._typeName:kd.name;return{name:kname,qty:v.qty,price:kp,finalPrice:kp,excluded:[],selectedType:v._typeName||null,isCafeteria:false,isKiosko:true,emoji:'🏪'};}
    if(id.startsWith('mitad|'))return{name:v._mitadName||id,qty:v.qty,price:v._mitadPrice||0,finalPrice:v._mitadPrice||0,excluded:[],selectedType:null,isCafeteria:false,emoji:'🍕'};
    const baseId2=id.includes('|')?id.split('|')[0]:id;
    const dPlato=DB.dishes[baseId2];
    const dCaf=DB.cafeteriaItems[baseId2];
    const d=dPlato||dCaf;
    if(!d)return null;
    const isCaf=!!dCaf;
    const selType=v.selectedType||null;
    return{name:d.name,qty:v.qty,price:d.price,finalPrice:isCaf?Number(d.price):dishFinalPrice(d,v.qty,selType),excluded:v.excluded?[...v.excluded]:[],selectedType:selType,is2x1:(!isCaf&&d.is2x1)||false,isCafeteria:isCaf||false,emoji:d.emoji||null};
  }).filter(Boolean);
  push(ref(db,'orders'),{tableId:C.customerTableId,items,status:'pending',time:nowStr(),billRequested:false,orderMode:C.orderMode,personName:C.orderMode==='individual'?C.customerName:null,createdAt:Date.now()});
  deductTypeStock(items);
  C.cart={};C.custDishId=null;C.cafCustId=null;C.custMitadDishId=null;C.customerStep='confirm';render();
};

window.confirmBill=()=>{
  if(!C.survey.paymentMethod){alert('Seleccioná el medio de pago');return;}
  const pm=C.survey.paymentMethod;
  const billCutoff=Date.now()-18*60*60*1000;
  // mark billed + save payment method in Firebase
  Object.entries(DB.orders).forEach(([k,o])=>{
    if(o.tableId===C.customerTableId&&o.status!=='cobrado'&&(o.createdAt||0)>=billCutoff)
      update(ref(db,`orders/${k}`),{status:'billed',billRequested:true,paymentMethod:pm});
  });
  // build survey items
  const cats=getCats();
  const noRatingCatKeys=new Set(cats.filter(c=>c.noRating).map(c=>c._key));
  const seen={};
  Object.values(DB.orders).filter(o=>o.tableId===C.customerTableId&&o.status!=='cobrado'&&(o.createdAt||0)>=billCutoff).forEach(o=>(o.items||[]).forEach(i=>{
    const dish=Object.values(DB.dishes).find(d=>d.name===i.name);
    if(dish&&noRatingCatKeys.has(dish.cat))return;
    seen[i.name]=true;
  }));
  C.survey.items=Object.keys(seen);
  C.customerStep='bill';
  render();
};

// ── COCINA ────────────────────────────────────────────────────────────────────
function renderCocina(mc){
  if(firstLoad){
    mc.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div class="spinner"></div><div style="font-size:14px;color:var(--muted)">Cargando pedidos...</div></div>`;
    return;
  }

  // Solo pedidos pendientes o en preparación, solo platos de restaurant (no caf, no kiosko)
  const orders = Object.entries(DB.orders||{})
    .map(([k,v])=>({...v,_key:k}))
    .filter(o=>
      (o.status==='pending'||o.status==='preparing') &&
      !o.isKiosko &&
      o.tableId !== 'kiosko' &&
      (o.items||[]).some(i=>!i.isCafeteria)
    )
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));

  // Items solo restaurant (excluir cafetería)
  const restaurantItems = o => (o.items||[]).filter(i=>!i.isCafeteria);

  const now = Date.now();
  const elapsed = o => {
    const ms = now - (o.createdAt||now);
    const m = Math.floor(ms/60000);
    return m < 1 ? 'ahora' : m === 1 ? 'hace 1 min' : `hace ${m} min`;
  };

  let h = `<div style="background:#111;min-height:100vh;color:#fff;font-family:inherit">`;
  // Header
  h += `<div style="background:#1a1a1a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;position:sticky;top:0;z-index:100">
    <div style="font-size:18px;font-weight:700">👨‍🍳 Cocina</div>
    <div style="font-size:13px;color:#888">${orders.length} pedido${orders.length!==1?'s':''} pendiente${orders.length!==1?'s':''}</div>
  </div>`;

  if(orders.length === 0){
    h += `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:12px;color:#666">
      <div style="font-size:48px">✅</div>
      <div style="font-size:18px;font-weight:600;color:#888">Todo al día</div>
      <div style="font-size:14px">No hay pedidos pendientes</div>
    </div>`;
  } else {
    h += `<div style="padding:14px;display:flex;flex-direction:column;gap:12px">`;
    orders.forEach(o=>{
      const table = DB.tables[o.tableId];
      const tableLabel = table ? table.label : (o.tableId||'Mesa');
      const items = restaurantItems(o);
      const isPreparing = o.status === 'preparing';
      const isListo = o.status === 'listo';
      const borderColor = isPreparing ? '#f59e0b' : '#333';
      const timeSince = elapsed(o);
      const minsAgo = Math.floor((now-(o.createdAt||now))/60000);
      const urgentColor = minsAgo >= 15 ? '#ef4444' : minsAgo >= 8 ? '#f59e0b' : '#888';

      h += `<div style="background:#1a1a1a;border:1.5px solid ${borderColor};border-radius:12px;overflow:hidden">`;
      // Card header
      h += `<div style="padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a2a">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="background:var(--brand);color:#fff;padding:4px 12px;border-radius:6px;font-size:15px;font-weight:700">${tableLabel}</div>
          ${o.orderMode==='individual'&&o.personName?`<span style="font-size:13px;color:#aaa">👤 ${o.personName}</span>`:''}
          ${isPreparing?`<span style="font-size:11px;background:#f59e0b22;color:#f59e0b;padding:2px 8px;border-radius:4px;font-weight:600">EN PREPARACIÓN</span>`:''}
        </div>
        <span style="font-size:12px;color:${urgentColor};font-weight:500">${timeSince}</span>
      </div>`;
      // Items
      h += `<div style="padding:12px 14px">`;
      items.forEach(item=>{
        h += `<div style="display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:0.5px solid #2a2a2a">
          <span style="font-size:22px;font-weight:800;color:#fff;min-width:28px">${item.qty}x</span>
          <div style="flex:1">
            <div style="font-size:16px;font-weight:600;color:#fff">${item.name}${item.selectedType?` <span style="font-size:12px;background:#1e40af33;color:#93c5fd;padding:1px 6px;border-radius:4px">${item.selectedType}</span>`:''}</div>
            ${item.excluded&&item.excluded.length>0?`<div style="font-size:12px;color:#ef4444;margin-top:2px">⚠️ SIN: ${item.excluded.join(', ')}</div>`:''}
          </div>
        </div>`;
      });
      h += `</div>`;
      // Actions
      h += `<div style="padding:10px 14px;display:flex;gap:8px">`;
      if(!isPreparing){
        h += `<button onclick="cocinaPreparando('${o._key}')" style="flex:1;padding:10px;border-radius:8px;border:0.5px solid #f59e0b;background:#f59e0b22;color:#f59e0b;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">🔥 Preparando</button>`;
      }
      h += `<button onclick="cocinaListo('${o._key}')" style="flex:1;padding:10px;border-radius:8px;border:none;background:#10b981;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">✓ Listo para entregar</button>`;
      h += `</div></div>`;
    });
    h += `</div>`;
  }
  h += `</div>`;
  mc.innerHTML = h;
}

window.cocinaPreparando=async key=>{
  await update(ref(db,`orders/${key}`),{status:'preparing'});
};
window.cocinaListo=async key=>{
  await update(ref(db,`orders/${key}`),{status:'delivered',readyAt:Date.now()});
};

window.doLogout=async()=>{
  await signOut(auth);
  currentUser=null;
  const lb=document.getElementById('logout-btn');
  if(lb) lb.style.display='none';
  document.getElementById('modetabs').style.display='none';
  render();
};

function showLogoutBtn(show){
  const lb=document.getElementById('logout-btn');
  if(lb) lb.style.display=show?'block':'none';
}

// Seed default categories if Firebase has none
async function seedCategoriesIfEmpty(){
  const snap=await new Promise(res=>onValue(ref(db,'categories'),res,{onlyOnce:true}));
  if(!snap.val()){
    DEFAULT_CATS.forEach((c,i)=>{
      push(ref(db,'categories'),{label:c.label,icon:c.icon,isPromo:c.isPromo||false,order:i});
    });
  }
}
seedCategoriesIfEmpty();

// ── TOPBAR CART BADGE ─────────────────────────────
function updateTopbarCart(){
  const cartEl=document.getElementById('topbar-cart');
  const countEl=document.getElementById('topbar-cart-count');
  if(!cartEl||!countEl)return;
  const isCustomer=C.mode==='customer'&&C.customerStep==='menu';
  const isWaiter=C.mode==='waiter'&&C.waiterStep==='menu';
  const show=isCustomer||isWaiter;
  cartEl.style.display=show?'block':'none';
  const waiterBtn=document.getElementById('topbar-waiter-btn');
  if(waiterBtn)waiterBtn.style.display=(isCustomer&&!isMenuRoute)?'block':'none';
  if(show){
    const ct=isWaiter?waiterCartCount():cartCount();
    countEl.textContent=ct;
    countEl.style.display=ct>0?'flex':'none';
  }
}
window.scrollToCart=()=>{
  const cartCol=document.querySelector('.cart-col');
  if(cartCol) cartCol.scrollIntoView({behavior:'smooth',block:'nearest'});
  // on mobile flash the cart
  if(cartCol){cartCol.style.outline='2px solid var(--accent)';setTimeout(()=>cartCol.style.outline='',1000);}
};

// ── LIMPIEZA DE ALERTS VIEJAS ─────────────────────
// Borra alerts con más de 4 horas de Firebase
async function limpiarAlertsViejas(){
  const HORAS=4;
  const limite=Date.now()-HORAS*60*60*1000;
  const viejas=Object.entries(DB.alerts||{}).filter(([,a])=>{
    const ts=a.createdAt||0;
    return ts>0&&ts<limite;
  });
  for(const [k] of viejas){
    try{ await remove(ref(db,`alerts/${k}`)); }
    catch(e){ console.warn('Error borrando alert',k,e); }
  }
  if(viejas.length>0)console.log(`Borradas ${viejas.length} alert${viejas.length!==1?'s':''} con más de ${HORAS} horas.`);
}

// ── ARCHIVADO AUTOMÁTICO DE PEDIDOS ──────────────
// Mueve pedidos con más de 60 días a /archivo/YYYY-MM y los elimina de /orders
async function archivarPedidosViejos(){
  const DIAS=60;
  const limite=Date.now()-DIAS*24*60*60*1000;
  const viejos=Object.entries(DB.orders).filter(([,o])=>{
    const ts=o.createdAt||0;
    return ts>0&&ts<limite;
  });
  if(viejos.length===0)return;
  // Agrupar por mes para organizar el archivo
  const porMes={};
  viejos.forEach(([k,o])=>{
    const d=new Date(o.createdAt);
    const mes=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!porMes[mes])porMes[mes]={};
    porMes[mes][k]=o;
  });
  // Guardar en /archivo/YYYY-MM y borrar de /orders
  for(const [mes,pedidos] of Object.entries(porMes)){
    for(const [k,o] of Object.entries(pedidos)){
      try{
        await set(ref(db,`archivo/${mes}/${k}`),o);
        await remove(ref(db,`orders/${k}`));
      }catch(e){
        console.warn('Error archivando pedido',k,e);
      }
    }
  }
  const total=viejos.length;
  console.log(`Archivados ${total} pedido${total!==1?'s':''} con más de ${DIAS} días.`);
}

initRoute();
