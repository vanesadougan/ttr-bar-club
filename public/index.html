// ── BARCODE BATCH SCANNER ─────────────────────────
window.stockBatchScan=(code)=>{
  const q=(code||'').trim();
  if(!q) return;
  // Buscar en todos los orígenes
  let found=null, foundSrc=null, foundTypeName=null;
  const ingMatch=Object.entries(DB.ingredients||{}).find(([,i])=>i.barcode===q||(i.barcodes&&i.barcodes.includes(q)));
  if(ingMatch){found={...ingMatch[1],_key:ingMatch[0]};foundSrc='ing';}
  if(!found){const m=Object.entries(DB.dishes||{}).find(([,d])=>d.barcode===q||(d.barcodes&&d.barcodes.includes(q)));if(m){found={...m[1],_key:m[0]};foundSrc='dishes';}}
  // Buscar en barcodes de tipos de platos
  if(!found){
    for(const [dishId,d] of Object.entries(DB.dishes||{})){
      if(!d.types)continue;
      for(const t of d.types){
        if(typeof t!=='object')continue;
        const tbc=t.barcodes||[];
        if(t.barcode)tbc.push(t.barcode);
        if(tbc.includes(q)){found={...d,_key:dishId};foundSrc='dishes';foundTypeName=t.name;break;}
      }
      if(found)break;
    }
  }
  if(!found){const m=Object.entries(DB.cafeteriaItems||{}).find(([,d])=>d.barcode===q||(d.barcodes&&d.barcodes.includes(q)));if(m){found={...m[1],_key:m[0]};foundSrc='cafeteria';}}
  if(!found){const m=Object.entries(DB.kioskItems||{}).find(([,d])=>d.barcode===q||(d.barcodes&&d.barcodes.includes(q)));if(m){found={...m[1],_key:m[0]};foundSrc='kiosko';}}

  if(!found){
    alert(`❌ Código "${q}" no encontrado.\nEditá el ingrediente o plato y asignale este código.`);
    return;
  }
  if(!C._barcodeBatch) C._barcodeBatch=[];

  // Si ya está en la lista (mismo plato + mismo tipo), sumar 1
  const existing=C._barcodeBatch.find(i=>i.key===found._key&&i.src===foundSrc&&(i.typeName||null)===(foundTypeName||null));
  if(existing){
    existing.delta+=1;
  } else {
    const displayName=foundTypeName?`${found.name} — ${foundTypeName}`:found.name;
    C._barcodeBatch.push({
      key: found._key,
      src: foundSrc,
      name: displayName,
      typeName: foundTypeName||null,
      barcode: q,
      unit: found.unit||'u',
      currentStock: foundTypeName
        ? (()=>{const t=(found.types||[]).find(t2=>(typeof t2==='string'?t2:t2.name)===foundTypeName);return t&&typeof t==='object'&&t.stock!=null?t.stock:0;})()
        : found.stock||0,
      delta: 1
    });
  }
  render();
  // Re-enfocar input después del render
  setTimeout(()=>{const inp=document.getElementById('barcode-scanner-input');if(inp)inp.focus();},50);
};

window.stockBatchDelta=(idx,delta)=>{
  if(!C._barcodeBatch)return;
  C._barcodeBatch[idx].delta=Number(C._barcodeBatch[idx].delta||0)+delta;
  render();
  setTimeout(()=>{const inp=document.getElementById('barcode-scanner-input');if(inp)inp.focus();},50);

window.stockBatchSetDelta=(idx,val)=>{
  if(!C._barcodeBatch)return;

};

window.stockBatchRemove=(idx)=>{
  if(!C._barcodeBatch)return;
  C._barcodeBatch.splice(idx,1);
  render();
};

window.stockBatchClear=()=>{
  C._barcodeBatch=[];

};

window.stockBatchApply=async()=>{
  const batch=C._barcodeBatch||[];
  if(!batch.length)return;
  for(const item of batch){
    const dbPath=item.src==='ing'?'ingredients':item.src==='dishes'?'dishes':item.src==='cafeteria'?'cafeteriaItems':'kioskItems';
    const newStock=Math.max(0,(item.currentStock||0)+Number(item.delta||0));
    if(item.typeName&&item.src==='dishes'){
      // Actualizar stock del tipo específico
      const dish=DB.dishes[item.key];
      if(dish&&dish.types){
        const updatedTypes=dish.types.map(t=>{
          if(typeof t==='string'||t.name!==item.typeName)return t;
          return{...t,stock:newStock};
        });
        await update(ref(db,`dishes/${item.key}`),{types:updatedTypes});
      }
    } else {
      await update(ref(db,`${dbPath}/${item.key}`),{stock:newStock});
    }
  }
  C._barcodeBatch=[];
  render();
  setTimeout(()=>{const inp=document.getElementById('barcode-scanner-input');if(inp)inp.focus();},50);
};

window.deleteIng=key=>{

  Object.entries(DB.dishes).forEach(([dk,d])=>{

  });

window.stockDelta=(key,src,delta)=>{
  const inputId=src==='ing'?`restock-${key}`:`restock-dish-${key}`;

window.setAdjustMode=(key,mode)=>{

  C._adjMode[key]=mode;
  const inp=document.getElementById('restock-'+key)||document.getElementById('restock-dish-'+key.replace('dish-',''));
  if(inp)inp.placeholder=mode==='set'?'Nuevo valor':'+/- cantidad';
  render();
};
window.applyStockAdj=async(key,src)=>{
  const adjKey=src==='ing'?key:'dish-'+key;
  const mode=(C._adjMode||{})[adjKey]||'add';
  const inputId=src==='ing'?`restock-${key}`:`restock-dish-${key}`;
  const inp=document.getElementById(inputId);
  const raw=inp?inp.value.trim():'';
  if(raw===''||isNaN(Number(raw))){alert('Ingresá un valor');return;}
  const val=Number(raw);
  if(inp)inp.value='';
  if(src==='ing'){
    const ing=DB.ingredients[key];if(!ing)return;
    const newStock=mode==='set'?Math.max(0,val):Math.max(0,(ing.stock||0)+val);
    await update(ref(db,`ingredients/${key}`),{stock:newStock});
  } else if(src==='__type__'&&key.includes('__')){
    // Fila de tipo — key = dishId__typeName
    const [dishId,typeName]=key.split('__');
    const dish=DB.dishes[dishId];if(!dish||!dish.types)return;
    const updatedTypes=dish.types.map(t=>{
      if((typeof t==='string'?t:t.name)!==typeName)return t;
      const cur=typeof t==='object'&&t.stock!=null?t.stock:0;
      return{...(typeof t==='object'?t:{name:t,priceMode:'base'}),stock:mode==='set'?Math.max(0,val):Math.max(0,cur+val)};
    });
    await update(ref(db,`dishes/${dishId}`),{types:updatedTypes});
  } else {
    const dbPath=src==='cafeteria'?'cafeteriaItems':src==='kiosko'?'kioskItems':'dishes';
    const d=src==='cafeteria'?DB.cafeteriaItems[key]:src==='kiosko'?DB.kioskItems[key]:DB.dishes[key];
    if(!d)return;
    const newStock=mode==='set'?Math.max(0,val):Math.max(0,(d.stock||0)+val);
    await update(ref(db,`${dbPath}/${key}`),{stock:newStock});
  }
};

// Auto-enable/disable dishes based on ingredient stock
function checkIngredientStock(){
  const ings=DB.ingredients||{};
  // Check dishes
  Object.entries(DB.dishes).forEach(([key,d])=>{
    const recipe=d.recipe||[];
    if(recipe.length===0)return;
    const outOfStock=recipe.some(r=>{
      const ing=ings[r.ingredientId];
      return ing&&(ing.stock||0)===0;
    });
    // Only auto-change if it was previously auto-managed (stockManaged flag)
    if(outOfStock&&!d.unavailable){
      update(ref(db,`dishes/${key}`),{unavailable:true,stockManaged:true});
      showNotif('alert',`Sin stock: ${d.name}`,'Plato ocultado automáticamente');
    }
  });
  // Check cafeteria items
  Object.entries(DB.cafeteriaItems||{}).forEach(([key,d])=>{
    const recipe=d.recipe||[];
    if(recipe.length===0)return;
    const outOfStock=recipe.some(r=>{
      const ing=ings[r.ingredientId];
      return ing&&(ing.stock||0)===0;
    });
    if(outOfStock&&!d.unavailable){
      update(ref(db,`cafeteriaItems/${key}`),{unavailable:true,stockManaged:true});
      showNotif('alert',`Sin stock: ${d.name}`,'Item ocultado automáticamente');
    }
  });
  // Alert for low stock
  Object.entries(ings).forEach(([,ing])=>{
    if(ing.alertAt!=null&&(ing.stock||0)>0&&(ing.stock||0)<=ing.alertAt){
      showNotif('alert',`⚠️ Stock bajo: ${ing.name}`,`Quedan ${ing.stock} ${ing.unit}`);
    }
  });
}

          h+=`<button onclick="reprintOrder('${o._key}')" title="Reimprimir comanda" style="padding:3px 8px;font-size:13px;border-radius:5px;border:0.5px solid #9ca3af;background:#f3f4f6;cursor:pointer;font-family:inherit">🖨️</button>`;

      // Footer de cobro por persona/grupo
      const canCobrar=!hasPending&&!hasPreparing&&!hasReadyAt&&!isBilled;
      if(isBilled){
        const pm=pgOrders.find(o=>o.paymentMethod)?.paymentMethod;
        const pmLabels={efectivo:'Efectivo',credito:'Créd.',debito:'Déb.',transferencia:'Transfer.',mercadopago:'Mercado Pago'};

        h+=`<div style="padding:8px 14px;background:#faf5ff;border-top:0.5px solid #e9d5ff;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;color:#7c3aed;font-weight:500">⚡ Pide cuenta${pm?' · '+(pmLabels[pm]||pm):''}</span><div style="display:flex;gap:6px"><button onclick="adminGroupCobrado(window._pgKeys[${_pgIdx}])" style="padding:4px 10px;font-size:12px;border-radius:6px;border:0.5px solid #5b21b6;color:#5b21b6;background:#ede9fe;cursor:pointer;font-family:inherit">Cobrar ✓</button></div></div>`;
      } else if(canCobrar){
        const _pgIdx=window._pgKeys.push(allKeys)-1;
        h+=`<div style="padding:8px 14px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;font-weight:600;color:var(--accent)">$${pgTotal.toLocaleString()}</span><div style="display:flex;gap:6px"><button onclick="adminGroupCobrado(window._pgKeys[${_pgIdx}])" style="padding:4px 10px;font-size:12px;border-radius:6px;border:0.5px solid #5b21b6;color:#5b21b6;background:#ede9fe;cursor:pointer;font-family:inherit">Cobrar ✓</button><button onclick="adminGroupDeudor(window._pgKeys[${_pgIdx}])" style="padding:4px 10px;font-size:12px;border-radius:6px;border:0.5px solid #dc2626;color:#dc2626;background:#fef2f2;cursor:pointer;font-family:inherit">💳 Deudor</button></div></div>`;
      } else if(hasPending||hasPreparing){
        h+=`<div style="padding:8px 14px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;font-weight:600;color:var(--accent)">$${pgTotal.toLocaleString()}</span><span style="font-size:11px;color:var(--muted)">⏳ Esperando entrega</span></div>`;
      }
    });

    h+=`</div>`; // cierre card mesa
  });

  h+=`</div>`; // cierre grid
  return h+`</div></div>`;
}

function renderDeudoresTab(){
  window._deudorKeys=[];
  window._deudorSaldos=[];
  const deudores=Object.entries(DB.orders)
    .map(([k,v])=>({...v,_key:k}))
    .filter(o=>o.status==='deudor')
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  let h='<div style="max-width:720px">';
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">`;
  h+=`<div><div style="font-size:18px;font-weight:600">💳 Deudores</div><div style="font-size:13px;color:var(--muted);margin-top:2px">${deudores.length} deuda${deudores.length!==1?'s':''} pendiente${deudores.length!==1?'s':''}</div></div>`;
  h+=`</div>`;

  if(deudores.length===0){
    h+=`<div style="text-align:center;padding:3rem 1rem;color:var(--muted);border:1.5px dashed var(--border);border-radius:14px">`;
    h+=`<div style="font-size:40px;margin-bottom:12px">✅</div>`;
    h+=`<div style="font-size:16px;font-weight:500">Sin deudas pendientes</div>`;
    h+=`</div>`;
  } else {
    // Agrupar por nombre de deudor
    const grupos={};
    deudores.forEach(o=>{
      const nombre=(o.deudorNombre||'Sin nombre').trim();
      if(!grupos[nombre]) grupos[nombre]={nombre,orders:[]};
      grupos[nombre].orders.push(o);
    });

    Object.values(grupos).forEach(g=>{
      const keys=g.orders.map(o=>o._key);
      const total=g.orders.reduce((s,o)=>(o.items||[]).reduce((si,i)=>si+(i.finalPrice||i.price)*i.qty,s),0);
      const firstOrder=g.orders[0];
      const table=DB.tables[firstOrder.tableId];
      const fecha=firstOrder.createdAt?new Date(firstOrder.createdAt).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
      const tableLabel2=table?table.label:(firstOrder.tableId||'—');

      // saldoPendiente siempre existe desde la creación del deudor
      const saldoMostrar=g.orders.reduce((s,o)=>s+(o.saldoPendiente!=null?o.saldoPendiente:(o.items||[]).reduce((si,i)=>si+(i.finalPrice||i.price)*i.qty,0)),0);
      const tuvoParcial=saldoMostrar<total;

      h+=`<div class="card" style="margin-bottom:.875rem;border-left:3px solid #dc2626">`;
      // Header
      h+=`<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">`;
      h+=`<div><div style="font-size:16px;font-weight:700">${g.nombre}</div>`;
      h+=`<div style="font-size:12px;color:var(--muted);margin-top:2px">${fecha} · ${tableLabel2}</div></div>`;
      h+=`<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:#dc2626">$${saldoMostrar.toLocaleString()}</div>${tuvoParcial?`<div style="font-size:11px;color:#059669;margin-top:1px">Pagó $${(total-saldoMostrar).toLocaleString()} de $${total.toLocaleString()}</div>`:''}</div>`;
      h+=`</div>`;

      // Items de todos los pedidos agrupados
      const seen={};
      g.orders.forEach(o=>(o.items||[]).forEach(i=>{
        const k=i.name+(i.selectedType?'|'+i.selectedType:'');
        if(seen[k])seen[k].qty+=i.qty;
        else seen[k]={...i};
      }));
      h+=`<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:12px">`;
      Object.values(seen).forEach(i=>{
        h+=`<div style="font-size:13px;color:var(--muted)">${i.qty}× <strong style="color:var(--text)">${i.name}</strong>${i.selectedType?` <span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:4px">${i.selectedType}</span>`:''} <span style="color:var(--accent)">$${((i.finalPrice||i.price)*i.qty).toLocaleString()}</span></div>`;
      });
      h+=`</div>`;

      // Botón único de cobro
      const dIdx=window._deudorKeys.push(keys)-1;
      if(!window._deudorSaldos)window._deudorSaldos=[];
      window._deudorSaldos[dIdx]=saldoMostrar;
      h+=`<button onclick="cobrarDeuda(window._deudorKeys[${dIdx}],window._deudorSaldos[${dIdx}])" style="width:100%;padding:10px;border-radius:8px;border:0.5px solid #d97706;background:#fffbeb;color:#92400e;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px">$ Pago Parcial/Total</button>`;
      h+=`</div>`;
    });
  }
  h+=`</div>`;
  return h;
}

window.marcarDeudor=async key=>{
  const o=DB.orders[key];if(!o)return;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML=`<div style="background:#fff;border-radius:16px;padding:1.5rem;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-size:16px;font-weight:600;margin-bottom:4px">💳 Registrar deudor</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:16px">Ingresá los datos del deudor para registrar la deuda pendiente</div>
    <div class="form-group" style="margin-bottom:16px"><label>Nombre y apellido</label><input id="deudor-nombre" placeholder="Nombre y apellido" style="width:100%;padding:8px 10px;border:0.5px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit"></div>
    <div style="display:flex;gap:8px">
      <button id="deudor-ok" class="btn btn-primary" style="flex:1">Registrar deuda</button>
      <button id="deudor-cancel" class="btn btn-ghost">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('deudor-nombre')?.focus(),50);
  const cleanup=()=>document.body.removeChild(overlay);
  document.getElementById('deudor-cancel').onclick=cleanup;

  document.getElementById('deudor-ok').onclick=async()=>{

    const apellido='';

    await update(ref(db,`orders/${key}`),{status:'deudor',deudorNombre:nombre,deudorApellido:apellido,deudorRegistradoAt:Date.now(),saldoPendiente:saldoInicial});
    if(DB.orders[key])DB.orders[key].saldoPendiente=saldoInicial;

window.cobrarDeuda=async(keys,saldoMostrado)=>{
  if(!getCajaAbierta()){alert('La caja está cerrada. Abrí la caja antes de cobrar.');return;}
  // Leer datos del deudor
  let nombreDeudor='';let tableLabel='';
  for(const k of keys){const o=DB.orders[k];if(!o)continue;if(!nombreDeudor)nombreDeudor=`${o.deudorNombre||''} ${o.deudorApellido||''}`.trim();if(!tableLabel){const t=DB.tables[o.tableId];tableLabel=t?t.label:(o.tableId||'');}break;}
  // Modal: cantidad a cobrar + medio de pago
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML=`<div style="background:var(--card);border-radius:16px;padding:1.5rem;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">💳 Cobro de deuda</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${nombreDeudor} · Deuda: <strong style="color:#dc2626">$${saldoMostrado.toLocaleString()}</strong></div>
    <div class="form-group" style="margin-bottom:8px">
      <label>Cantidad cobrada</label>
      <input id="cobro-monto" type="number" min="1" max="${saldoMostrado}" placeholder="$0" value="${saldoMostrado}"
        style="width:100%;padding:10px 12px;border:1.5px solid var(--brand);border-radius:8px;font-size:20px;font-weight:700;font-family:inherit;text-align:center;box-sizing:border-box">
    </div>
    <div id="cobro-resta" style="text-align:center;font-size:13px;color:#059669;margin-bottom:12px;min-height:18px">Saldo saldado</div>
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">Medio de pago</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
      ${[{v:'efectivo',l:'💵 Efectivo'},{v:'debito',l:'💳 Débito'},{v:'credito',l:'💳 Crédito'},{v:'transferencia',l:'📱 Transferencia'},{v:'mercadopago',l:'📱 Mercado Pago'}].map(p=>`<button data-pm="${p.v}" style="padding:9px 14px;border-radius:8px;border:0.5px solid #e5e7eb;background:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left">${p.l}</button>`).join('')}
    </div>
    <button onclick="this.closest('[style*=fixed]').remove()" style="width:100%;padding:8px;border-radius:8px;border:0.5px solid var(--border);background:transparent;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit">Cancelar</button>
  </div>`;
  document.body.appendChild(overlay);
  const inp=overlay.querySelector('#cobro-monto');
  const restaEl=overlay.querySelector('#cobro-resta');
  inp.addEventListener('input',()=>{
    const m=Math.min(Number(inp.value)||0,saldoMostrado);
    if(m<=0){restaEl.textContent='';restaEl.style.color='var(--muted)';}
    else if(m>=saldoMostrado){restaEl.textContent='Saldo saldado';restaEl.style.color='#059669';}
    else{restaEl.textContent=`Quedan $${(saldoMostrado-m).toLocaleString()}`;restaEl.style.color='#d97706';}
  });
  inp.select();
  overlay.querySelectorAll('[data-pm]').forEach(btn=>{
    btn.addEventListener('mouseover',()=>btn.style.background='#f8f7f4');
    btn.addEventListener('mouseout',()=>btn.style.background='#fff');
    btn.addEventListener('click',async()=>{
      const monto=Math.min(Number(inp.value)||0,saldoMostrado);
      if(!monto||monto<=0){inp.focus();inp.style.borderColor='#dc2626';return;}
      const pm=btn.dataset.pm;
      overlay.remove();
      const pmL={efectivo:'Efectivo',debito:'Débito',credito:'Crédito',transferencia:'Transferencia',mercadopago:'Mercado Pago'};
      const nuevoSaldo=Math.max(0,saldoMostrado-monto);
      const esSaldado=nuevoSaldo===0;
      // Actualizar Firebase y cache local
      for(const k of keys){
        const o=DB.orders[k];if(!o)continue;
        if(esSaldado){
          await update(ref(db,`orders/${k}`),{status:'cobrado',paymentMethod:pm,fromDeuda:true,cobradoAt:Date.now(),saldoPendiente:0});
          if(DB.orders[k])DB.orders[k].saldoPendiente=0;
        } else {
          const saldoK=o.saldoPendiente!=null?o.saldoPendiente:(o.items||[]).reduce((s,i)=>s+(i.finalPrice||i.price)*i.qty,0);
          const nuevoSaldoK=Math.max(0,saldoK-(monto));
          await update(ref(db,`orders/${k}`),{saldoPendiente:nuevoSaldoK});
          if(DB.orders[k])DB.orders[k].saldoPendiente=nuevoSaldoK;
        }
      }
      // Registrar en caja
      const concepto=`${esSaldado?'Deudor':'Pago parcial'}: ${nombreDeudor} · ${tableLabel} (${pmL[pm]||pm})${!esSaldado?` — quedan $${nuevoSaldo.toLocaleString()}`:''}`;
      const hoy=new Date().toISOString().slice(0,10);
      await push(ref(db,'caja'),{tipo:'venta',concepto,monto,fecha:hoy,ts:Date.now(),desc:'',paymentMethod:pm,parcial:!esSaldado});
      render();
    });
  });
};

window.cobrarDeudor=async key=>{
  if(!getCajaAbierta()){alert('La caja está cerrada. Abrí la caja antes de cobrar.');return;}
  const pm=await showPaymentChoiceModal(null);
  if(!pm)return;
  const o=DB.orders[key];if(!o)return;
  const total=(o.items||[]).reduce((s,i)=>s+(i.finalPrice||i.price)*i.qty,0);
  // Pasar el pedido a cobrado, conservando que vino de deuda
  await update(ref(db,`orders/${key}`),{status:'cobrado',paymentMethod:pm,fromDeuda:true,cobradoAt:Date.now()});
  // Registrar en caja
  if(total>0&&getCajaAbierta()){
    const pmL={efectivo:'Efectivo',debito:'Débito',credito:'Crédito',transferencia:'Transferencia',mercadopago:'Mercado Pago'};
    const table=DB.tables[o.tableId];
    const concepto=`Deudor: ${o.deudorNombre} ${o.deudorApellido} · ${table?table.label:o.tableId} (${pmL[pm]||pm})`;
    const hoy=new Date().toISOString().slice(0,10);
    await push(ref(db,'caja'),{tipo:'venta',concepto,monto:total,fecha:hoy,ts:Date.now(),desc:'',paymentMethod:pm});
  }
  render();
};

// ── RATINGS TAB ───────────────────────────────────
function renderRatingsTab(){
  const allRated=Object.entries(DB.ratings).filter(([,r])=>r&&r.count>0);
  if(allRated.length===0)return`<div class="no-ratings"><div style="font-size:40px;margin-bottom:1rem">⭐</div><div style="font-size:16px;font-weight:500">Todavía no hay calificaciones</div></div>`;
  const sorted=[...allRated].sort((a,b)=>(b[1].total/b[1].count)-(a[1].total/a[1].count));
  const totalReviews=allRated.reduce((s,[,r])=>s+r.count,0);
  const globalAvg=allRated.reduce((s,[,r])=>s+r.total,0)/allRated.reduce((s,[,r])=>s+r.count,0);
  const medals=['🥇','🥈','🥉'];const medalCls=['gold','silver','bronze'];
  let h=`<div class="ratings-hero"><div class="card"><div class="card-title">Resumen general</div><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px"><span style="font-size:36px;font-weight:600">${globalAvg.toFixed(1)}</span><div>${starsHtml(globalAvg,18)}</div></div><div style="font-size:13px;color:var(--muted)">${totalReviews} calificación${totalReviews!==1?'es':''}</div></div><div class="card"><div class="card-title">Top 3 platos</div>`;
  const dishes=Object.values(DB.dishes);
  sorted.slice(0,3).forEach(([name,r],i)=>{const avg=(r.total/r.count).toFixed(1);const d=dishes.find(x=>x.name===name);h+=`<div class="podium-item"><div class="podium-rank ${medalCls[i]}">${medals[i]}</div><div style="font-size:18px">${d?d.emoji:''}</div><div style="flex:1;font-size:13px;font-weight:500">${name}</div><div style="font-size:13px;font-weight:600;color:var(--warn)">${avg} ★</div></div>`;});
  h+=`</div></div>`;
  sorted.forEach(([name,r])=>{const avg=r.total/r.count;const d=dishes.find(x=>x.name===name);h+=`<div class="rating-row"><div style="font-size:24px;width:36px;text-align:center;flex-shrink:0">${d?d.emoji:'🍽️'}</div><div class="rating-info"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div class="rating-name">${name}</div><div style="display:flex;align-items:center;gap:8px"><div class="stars-display">${starsHtml(avg,14)}</div><div style="font-size:20px;font-weight:600;min-width:36px;text-align:right">${avg.toFixed(1)}</div><div style="font-size:11px;color:var(--muted);min-width:52px;text-align:right">${r.count} voto${r.count!==1?'s':''}</div></div></div><div class="rating-bar-wrap"><div class="rating-bar" style="width:${(avg/5)*100}%"></div></div></div></div>`;});
  return h;
}

function renderHistoryTab(){
  const now=new Date();
  const todayStr=now.toLocaleDateString('es-AR');
  const yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);
  const yesterdayStr=yesterday.toLocaleDateString('es-AR');
  const fmtDate=ts=>{if(!ts)return'';const d=new Date(ts);return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});};
  const fmtTime=ts=>{if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');};

  // Pedidos cobrados normales
  const ordersCol=Object.entries(DB.orders).map(([k,v])=>({...v,_key:k,_tipo:'pedido'})).filter(o=>o.status==='cobrado'&&!o.fromDeuda);

  // Pedidos cobrados que vinieron de deuda
  const deudoresCol=Object.entries(DB.orders)
    .map(([k,v])=>({...v,_key:k,_tipo:'deuda'}))
    .filter(o=>o.status==='cobrado'&&o.fromDeuda===true);

  // Combinar y ordenar por fecha descendente
  const all=[...ordersCol,...deudoresCol].sort((a,b)=>{
    const ta=a._tipo==='deuda'?(a.cobradoAt||a.createdAt||0):(a.createdAt||0);
    const tb=b._tipo==='deuda'?(b.cobradoAt||b.createdAt||0):(b.createdAt||0);
    return tb-ta;
  });

  const cobradoKeys=ordersCol.map(o=>o._key);

  const getTs=o=>o._tipo==='deuda'?(o.cobradoAt||o.createdAt||0):(o.createdAt||0);

  const fil=all.filter(o=>{
    const ts=getTs(o);
    if(!ts)return C.historyFilter==='todos';
    const d=new Date(ts).toLocaleDateString('es-AR');
    if(C.historyFilter==='hoy')return d===todayStr;
    if(C.historyFilter==='ayer')return d===yesterdayStr;
    return true;
  });

  const totalFil=fil.reduce((s,o)=>(o.items||[]).reduce((ss,i)=>ss+(i.finalPrice||i.price)*i.qty,s),0);

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem">`;
  h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  [['hoy','Hoy'],['ayer','Ayer'],['todos','Todos']].forEach(([val,lbl])=>{
    const a=C.historyFilter===val;
    h+=`<button onclick="setHistFilter('${val}')" style="padding:5px 12px;border-radius:16px;font-size:13px;border:0.5px solid var(--border);cursor:pointer;font-family:inherit;background:${a?'var(--brand)':'var(--card)'};color:${a?'#fff':'var(--muted)'}">${lbl}</button>`;
  });
  h+=`</div>`;
  if(cobradoKeys.length>0){
    h+=`<button onclick="clearHistory()" style="padding:6px 14px;border-radius:8px;border:0.5px solid #fca5a5;background:#fff1f2;color:#b91c1c;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">🗑 Limpiar (${cobradoKeys.length})</button>`;
  }
  h+=`</div>`;
  if(fil.length>0){
    h+=`<div style="padding:10px 14px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center">`;
    h+=`<span style="font-size:13px;color:var(--muted)">${fil.length} registro${fil.length!==1?'s':''}</span>`;
    h+=`<span style="font-size:16px;font-weight:700;color:var(--accent)">$${totalFil.toLocaleString()}</span>`;
    h+=`</div>`;
  }

  h+=`<div class="orders-list">`;
  if(fil.length===0)h+=`<div class="empty-state">No hay registros cobrados${C.historyFilter!=='todos'?' '+C.historyFilter:''}</div>`;
  const pmLabels={efectivo:'💵 Efectivo',credito:'💳 Créd.',debito:'💳 Déb.',transferencia:'📱 Transfer.',mercadopago:'📱 Mercado Pago'};

  fil.forEach(o=>{
    const total=(o.items||[]).reduce((s,i)=>s+(i.finalPrice||i.price)*i.qty,0);
    const ts=getTs(o);
    const dateStr=ts?`${fmtDate(ts)} ${fmtTime(ts)}`:(o.time||'');
    const pm=o.paymentMethod;

    if(o._tipo==='deuda'){
      // Card de deuda cobrada
      h+=`<div class="order-card" style="border-left:3px solid #dc2626">`;
      h+=`<div class="order-header">`;
      h+=`<div class="order-tname">${tableLabel(o.tableId)} <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#fee2e2;color:#b91c1c">💳 Deuda</span> <span style="font-size:13px;font-weight:500;color:var(--text)">${o.deudorNombre||''} ${o.deudorApellido||''}</span></div>`;
      h+=`<div class="order-time">${dateStr}</div>`;
      h+=`</div>`;
      h+=`<div class="order-items-text">`;
      (o.items||[]).forEach(i=>{h+=`${i.qty}× <strong>${i.name}</strong>${i.selectedType?` <em>(${i.selectedType})</em>`:''}<br>`;});
      h+=`</div>`;
      h+=`<div class="order-footer"><span class="status status-cobrado">Cobrado</span>`;
      if(pm)h+=`<span style="font-size:12px;color:var(--muted)">${pmLabels[pm]||pm}</span>`;
      h+=`<span style="font-weight:600;font-size:14px">$${total.toLocaleString()}</span></div></div>`;
    } else {
      // Card de pedido normal cobrado
      const chip=o.orderMode==='individual'?`<span class="order-type-chip ot-individual">👤 ${o.personName}</span>`:`<span class="order-type-chip ot-general">👥 General</span>`;
      const kioskChip=o.isKiosko?`<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#d1fae5;color:#065f46">🏪 Kiosko</span>`:'';
      const waiterChip=o.takenBy?`<span style="font-size:11px;background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:6px;font-weight:500">👩 ${o.takenBy}</span>`:'';
      h+=`<div class="order-card"><div class="order-header"><div class="order-tname">${o.isKiosko?kioskChip:tableLabel(o.tableId)+chip}${waiterChip}</div><div class="order-time">${dateStr}</div></div>`;
      h+=`<div class="order-items-text">`;
      (o.items||[]).forEach(i=>{h+=`${i.qty}× <strong>${i.name}</strong>${i.excluded&&i.excluded.length>0?` <span class="removed-ing">sin: ${i.excluded.join(', ')}</span>`:''}<br>`;});
      h+=`</div>`;
      h+=`<div class="order-footer"><span class="status status-cobrado">Cobrado</span>`;
      if(pm)h+=`<span style="font-size:12px;color:var(--muted)">${pmLabels[pm]||pm}</span>`;
      h+=`<span style="font-weight:600;font-size:14px">$${total.toLocaleString()}</span></div></div>`;
    }
  });
  return h+`</div>`;
}

window.uF=(type,field,val)=>{
  const o=type==='dish'?(C.editingDish||C.newDish):(C.editingTable||C.newTable);
  if(field==='stock'){
    // Guardar como string para no interrumpir el tipeo
    o[field]=val===''||val==null?null:val;
    // Re-render solo si el badge cambia de bucket (0, <=5, >5)
    const num=val===''||val==null?null:Number(val);
    const prev=C._prevStock;
    const bucket=n=>n===null?'null':n===0?'zero':n<=5?'low':'ok';
    if(bucket(prev)!==bucket(num)){render();}
    C._prevStock=num;
    return;
  }
  if(field==='alertAt'){
    o[field]=val===''||val==null?null:val;
    return;
  }
  o[field]=(field==='price'||field==='capacity'||field==='promoDiscount')?Number(val):val;
  // when toggling 2x1, clear discount and re-render
  if(type==='dish'&&field==='is2x1'){
    if(val)o.promoDiscount=0; // activar 2x1 limpia el descuento
    render();return;
  }
  // only re-render on category change (dropdown); for typed fields update preview inline
  if(type==='dish'&&field==='cat'){
    // Si la categoría tiene directStock, activar stock automáticamente
    const cats=getCats();
    const selCat=cats.find(c=>c._key===val);
    if(selCat&&selCat.directStock&&(o.stock===null||o.stock==='')){
      o.stock=0;
    }
    render();return;
  }
  if(type==='dish'&&(field==='price'||field==='promoDiscount')){
    // Si 2x1 activo, re-renderizar para actualizar el preview
    if(o.is2x1){render();return;}
    updateDiscountPreview();
  }
};

function updateDiscountPreview(){
  const f=C.editingDish||C.newDish;
  const cats=getCats();
  const selCat=cats.find(c=>c._key===f.cat);
  const isPromo=selCat&&selCat.isPromo;
  const el=document.getElementById('discount-preview');
  if(!el)return;
  if(isPromo&&f.promoDiscount>0&&f.price){
    const fp=Math.round(Number(f.price)*(1-Number(f.promoDiscount)/100));
    el.innerHTML=`<span style="color:var(--muted)">Normal:</span><span style="text-decoration:line-through;color:var(--muted)">$${Number(f.price).toLocaleString()}</span><span>→</span><span style="font-size:11px;font-weight:600;color:#c2410c;background:#fff7ed;border:0.5px solid #fed7aa;border-radius:4px;padding:1px 6px">-${f.promoDiscount}%</span><strong style="color:var(--accent)">$${fp.toLocaleString()}</strong>`;
  } else {
    el.innerHTML='<div style="font-size:12px;color:#92400e">Ingresá precio y descuento.</div>';
  }
}

window.updateManualSearch=()=>{
  const inp=document.getElementById('manual-search');
  const list=document.getElementById('manual-search-results');
  if(!list)return;
  const val=inp?inp.value:(C.manualOrderSearch||'');
  if(inp)C.manualOrderSearch=inp.value;
  const search=val.toLowerCase().trim();
  if(search.length<1){list.style.display='none';list.innerHTML='';return;}
  const allItems=[
    ...Object.entries(DB.dishes).map(([k,v])=>({...v,_key:k,_src:'dishes'})),
    ...Object.entries(DB.cafeteriaItems||{}).map(([k,v])=>({...v,_key:k,_src:'cafeteria',emoji:v.emoji||'☕'})),
    ...Object.entries(DB.kioskItems||{}).map(([k,v])=>({...v,_key:k,_src:'kiosko',emoji:'🏪'}))
  ].filter(d=>{
    if(d.unavailable)return false;
    if(d.name.toLowerCase().includes(search))return true;
    // Buscar por código de barras
    if(d.barcodes&&d.barcodes.some(b=>String(b).includes(search)))return true;
    if(d.types&&d.types.some(t=>t.barcodes&&t.barcodes.some(b=>String(b).includes(search))))return true;
    return false;
  });
  // Deduplicar por nombre+src
  const seen=new Set();
  const unique=allItems.filter(d=>{const k=d.name+'|'+d._src;if(seen.has(k))return false;seen.add(k);return true;});
  list.style.display='block';
  if(unique.length===0){
    list.innerHTML=`<div style="padding:10px 14px;font-size:13px;color:var(--muted)">Sin resultados para "${val}"</div>`;
    return;
  }
  const srcLabel={cafeteria:'☕ Cafetería',kiosko:'🏪 Kiosko',dishes:'🍽 Restaurant'};
  list.innerHTML=unique.map(d=>`<div onclick="selectManualItem('${d._key}','${d._src}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:0.5px solid var(--border)" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
    <span style="font-size:18px">${d.emoji||'🍽️'}</span>
    <div style="flex:1"><div style="font-size:14px;font-weight:500">${d.name}</div><div style="font-size:12px;color:var(--muted)">${srcLabel[d._src]||''}${d.hasTypes&&(d.types||[]).length>0?' · variantes':''}${d.customizable&&(d.ingredients||[]).length>0?' · personalizable':''}</div></div>
    <span style="font-size:14px;font-weight:600;color:var(--accent)">$${Number(d.price).toLocaleString()}</span>
  </div>`).join('');
};

window.updateKioskoSearch=()=>{
  const raw=document.getElementById('kiosko-search')?.value||'';
  C.kioskoSearch=raw;
  const q=raw.toLowerCase().trim();
  const res=document.getElementById('kiosko-search-results');if(!res)return;
  if(!q){res.style.display='none';return;}

  const results=[];

  // ── Kiosko items ──
  Object.entries(DB.kioskItems||{}).forEach(([k,v])=>{
    const barcodes=[v.barcode,...(v.barcodes||[])].filter(Boolean);
    const matchName=v.name.toLowerCase().includes(q);
    const matchBarcode=barcodes.some(b=>b.toLowerCase().includes(q));
    if((matchName||matchBarcode)&&(v.stock==null||v.stock>0))
      results.push({_key:k,name:v.name,price:Number(v.price),stock:v.stock,_src:'kiosko',icon:'🏪'});
  });

  // ── Platos de categorías con directStock (Bebidas, etc.) ──
  const directStockCatIds=new Set(Object.entries(DB.categories||{}).filter(([,c])=>c.directStock).map(([k])=>k));
  Object.entries(DB.dishes||{}).forEach(([k,v])=>{
    if(!directStockCatIds.has(v.cat)||v.unavailable)return;
    const cat=DB.categories?.[v.cat];
    // Buscar en barcodes del plato
    const barcodes=[v.barcode,...(v.barcodes||[])].filter(Boolean);
    const matchName=v.name.toLowerCase().includes(q);
    const matchBarcode=barcodes.some(b=>b.toLowerCase().includes(q));
    if(matchName||matchBarcode){
      results.push({_key:k,name:v.name,price:Number(v.price),stock:v.stock,_src:'dish',icon:cat?.icon||'🍽',catLabel:cat?.label||''});
      return;
    }
    // Buscar en barcodes de tipos
    (v.types||[]).forEach(t=>{
      if(typeof t!=='object')return;
      const tname=t.name;
      if(t.stock===0)return; // sin stock, no mostrar
      const tbcs=[t.barcode,...(t.barcodes||[])].filter(Boolean);
      const matchType=tname.toLowerCase().includes(q)||tbcs.some(b=>b.toLowerCase().includes(q));
      if(matchType){
        const fp=dishFinalPrice(v,1,tname);
        results.push({_key:k,name:`${v.name} — ${tname}`,price:fp,stock:t.stock,_src:'dish',_typeName:tname,icon:cat?.icon||'🍽',catLabel:cat?.label||''});
      }
    });
  });

  if(results.length===0){res.innerHTML='<div style="padding:10px;font-size:13px;color:var(--muted)">Sin resultados</div>';res.style.display='block';return;}
  res.style.display='block';
  res.innerHTML=results.map(d=>{
    const sc=d.stock!=null?`<span style="font-size:11px;color:var(--muted)"> · 📦 ${d.stock}</span>`:'';
    const srcLabel=d._src==='dish'?`<span style="font-size:10px;background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:4px;margin-left:4px">${d.catLabel}</span>`:'';
    const typeParam=d._typeName?`,\`${d._typeName.replace(/`/g,"'")}\``:'';
    return `<div onclick="kioskoAddItem('${d._key}','${d._src}'${typeParam})" style="padding:10px 14px;cursor:pointer;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px" onmouseover="this.style.background='#f8f7f4'" onmouseout="this.style.background=''">
      <span>${d.icon} ${d.name}${srcLabel}${sc}</span>
      <span style="font-weight:600;color:var(--accent)">$${d.price.toLocaleString()}</span>
    </div>`;
  }).join('');
};

window.submitKioskoOrder=async(modo)=>{
  const ko=C.kioskoOrder;if(!ko)return;
  if(!ko.items.length){alert('Agregá al menos un producto');return;}
  const nombreInp=document.getElementById('kiosko-nombre');
  if(nombreInp)ko.personName=nombreInp.value.trim();
  const total=ko.items.reduce((s,i)=>s+i.price*i.qty,0);
  const pmL={efectivo:'Efectivo',debito:'Débito',credito:'Crédito',transferencia:'Transferencia',mercadopago:'Mercado Pago'};

  if(modo==='cobrado'){
    if(!getCajaAbierta()){alert('La caja está cerrada. Abrí la caja antes de cobrar.');return;}
    const res=await showPaymentChoiceModal(null,total);
    if(!res)return;
    const pm=res.pm;const descuento=res.descuento||0;const pct=res.pct||0;
    const totalFinal=total-descuento;
    // Descontar stock (kiosko y dishes con stock)
    for(const item of ko.items){
      if(item._src==='dish'){
        const d=DB.dishes[item.dishKey];
        if(!d)continue;
        if(item.typeName){
          const updatedTypes=(d.types||[]).map(t=>{
            if((typeof t==='string'?t:t.name)!==item.typeName)return t;
            const cur=typeof t==='object'&&t.stock!=null?t.stock:0;
            const ns=Math.max(0,cur-item.qty);
            if(ns===0)showNotif('alert','Sin stock: '+item.name,'Quedan 0 unidades');
            return{...(typeof t==='object'?t:{name:t,priceMode:'base'}),stock:ns};
          });
          await update(ref(db,`dishes/${item.dishKey}`),{types:updatedTypes});
        } else if(d.stock!=null){
          const newStock=Math.max(0,(d.stock||0)-item.qty);
          await update(ref(db,`dishes/${item.dishKey}`),{stock:newStock});
          if(newStock===0)showNotif('alert','Sin stock: '+d.name,'Quedan 0 unidades');
        }
      } else {
        const d=DB.kioskItems[item.kioskKey];
        if(d&&d.stock!=null){
          const newStock=Math.max(0,(d.stock||0)-item.qty);
          await update(ref(db,`kioskItems/${item.kioskKey}`),{stock:newStock});
          if(newStock===0)showNotif('alert','Sin stock: '+d.name,'Quedan 0 unidades');

    // Crear pedido en historial
    const itemsOrder=ko.items.map(i=>({name:i.name,qty:i.qty,price:i.price,finalPrice:i.price,isKiosko:true}));
    await push(ref(db,'orders'),{tableId:'kiosko',items:itemsOrder,status:'cobrado',time:nowStr(),createdAt:Date.now(),orderMode:'individual',personName:ko.personName||null,paymentMethod:pm,descuento,pct,isKiosko:true});
    C.kioskoOrder=null;C.kioskoSearch='';
    showNotif('order','Venta Kiosko cobrada',`$${totalFinal.toLocaleString()}${pct>0?` (-${pct}%)`:''} · ${pmL[pm]}`);

  } else if(modo==='deudor'){
    if(!ko.personName){alert('Ingresá el nombre del deudor (obligatorio)');if(nombreInp)nombreInp.focus();return;}
    // Descontar stock (kiosko y dishes con stock)
    for(const item of ko.items){
      if(item._src==='dish'){
        const d=DB.dishes[item.dishKey];
        if(!d)continue;
        if(item.typeName){
          const updatedTypes=(d.types||[]).map(t=>{
            if((typeof t==='string'?t:t.name)!==item.typeName)return t;
            const cur=typeof t==='object'&&t.stock!=null?t.stock:0;
            const ns=Math.max(0,cur-item.qty);
            if(ns===0)showNotif('alert','Sin stock: '+item.name,'Quedan 0 unidades');
            return{...(typeof t==='object'?t:{name:t,priceMode:'base'}),stock:ns};
          });
          await update(ref(db,`dishes/${item.dishKey}`),{types:updatedTypes});
        } else if(d.stock!=null){
          const newStock=Math.max(0,(d.stock||0)-item.qty);
          await update(ref(db,`dishes/${item.dishKey}`),{stock:newStock});
          if(newStock===0)showNotif('alert','Sin stock: '+d.name,'Quedan 0 unidades');
        }
      } else {
        const d=DB.kioskItems[item.kioskKey];
        if(d&&d.stock!=null){
          const newStock=Math.max(0,(d.stock||0)-item.qty);
          await update(ref(db,`kioskItems/${item.kioskKey}`),{stock:newStock});
          if(newStock===0)showNotif('alert','Sin stock: '+d.name,'Quedan 0 unidades');
        }
      }
    }
    // Crear pedido en orders con status deudor
    const items=ko.items.map(i=>({name:i.name,qty:i.qty,price:i.price,finalPrice:i.price,isKiosko:true}));
    const saldoInicial=ko.items.reduce((s,i)=>s+i.price*i.qty,0);
    const nombre=ko.personName.split(' ')[0]||ko.personName;
    const apellido=ko.personName.split(' ').slice(1).join(' ')||'';
    await push(ref(db,'orders'),{
      tableId:'kiosko',items,status:'deudor',
      time:nowStr(),createdAt:Date.now(),
      orderMode:'individual',personName:ko.personName,
      deudorNombre:nombre,deudorApellido:apellido,
      deudorRegistradoAt:Date.now(),
      saldoPendiente:saldoInicial,
      isKiosko:true
    });
    C.kioskoOrder=null;C.kioskoSearch='';
    showNotif('order','Deuda Kiosko registrada',ko.personName);
    C.adminTab='deudores';
  }
  render();
};

window.adminGroupCobrado=async keys=>{

window.markDelivered=async key=>{
  await update(ref(db,`orders/${key}`),{status:'delivered'});
  const o=DB.orders[key];
  if(o&&o.items){
    for(const item of o.items){
      const dishEntry=Object.entries(DB.dishes).find(([,d])=>d.name===item.name);
      const cafEntry=Object.entries(DB.cafeteriaItems||{}).find(([,d])=>d.name===item.name);
      const d=dishEntry?dishEntry[1]:cafEntry?cafEntry[1]:null;
      const dKey=dishEntry?dishEntry[0]:cafEntry?cafEntry[0]:null;
      const dbPath=dishEntry?'dishes':cafEntry?'cafeteriaItems':null;
      if(!d||!dKey||!dbPath)continue;
      const recipe=d.recipe||[];
      if(recipe.length>0){
        // Descontar por ingredientes de la receta
        for(const r of recipe){
          const ing=DB.ingredients[r.ingredientId];
          if(ing==null)continue;
          const newStock=Math.max(0,(ing.stock||0)-r.qty*item.qty);
          await update(ref(db,`ingredients/${r.ingredientId}`),{stock:newStock});
        }
      } else if(d.stock!=null){
        // Sin receta: descontar stock directo del plato
        const newStock=Math.max(0,(d.stock||0)-item.qty);
        await update(ref(db,`${dbPath}/${dKey}`),{stock:newStock});
        if(newStock===0){
          showNotif('alert','Sin stock: '+d.name,'Quedan 0 unidades');
        } else if(d.alertAt!=null&&newStock<=d.alertAt){
          showNotif('alert','⚠️ Stock bajo: '+d.name,'Quedan '+newStock);
        }
      }
    }
  }
};

window.markGroupCobrado=async gi=>{
  const g=window._billedGroups&&window._billedGroups[gi];if(!g)return;
  if(!getCajaAbierta()){alert('La caja está cerrada. Abrí la caja antes de cobrar.');return;}
  const totalBase=g.orders.reduce((s,o)=>(o.items||[]).reduce((si,i)=>si+(i.finalPrice||i.price)*i.qty,s),0);
  const pm=g.paymentMethod||g.orders.find(o=>o.paymentMethod)?.paymentMethod||null;
  let finalPm=pm;let descuento=0;let pct=0;
  if(finalPm){
    // Medio de pago ya elegido por la moza — solo pedir descuento
    const disc=await showDiscountModal(totalBase);
    descuento=disc.descuento;pct=disc.pct;
  } else {
    const res=await showPaymentChoiceModal(null,totalBase);
    if(!res)return;
    finalPm=res.pm;descuento=res.descuento||0;pct=res.pct||0;
  }
  const totalFinal=totalBase-descuento;

window.moveCat=(key,direction)=>{
  const cats=getCats();
  const idx=cats.findIndex(c=>c._key===key);
  if(idx===-1)return;
  const swapIdx=idx+direction;
  if(swapIdx<0||swapIdx>=cats.length)return;
  // swap order values between the two categories
  const a=cats[idx];
  const b=cats[swapIdx];
  const aOrder=a.order!==undefined?a.order:idx;
  const bOrder=b.order!==undefined?b.order:swapIdx;
  update(ref(db,`categories/${a._key}`),{order:bOrder});
  update(ref(db,`categories/${b._key}`),{order:aOrder});
};

// Stock por tipo
function typeStockOf(d,typeName){if(!d||!d.types)return null;const t=d.types.find(t=>(typeof t==='string'?t:t.name)===typeName);if(!t||typeof t==='string')return null;return t.stock!=null?t.stock:null;}
function availableTypes(d){if(!d||!d.types)return[];return d.types.filter(t=>{const s=typeof t==='object'?t.stock:null;return s==null||s>0;});}
// Descuenta stock de tipos al confirmar pedido
async function deductTypeStock(items){
  for(const item of items){
    if(!item.selectedType)continue;
    // Buscar el plato por nombre en DB.dishes
    const dishEntry=Object.entries(DB.dishes).find(([,d])=>d.name===item.name);
    if(!dishEntry)continue;
    const [dishId,dish]=dishEntry;
    if(!dish.types)continue;
    const typeIdx=dish.types.findIndex(t=>(typeof t==='string'?t:t.name)===item.selectedType);
    if(typeIdx<0)continue;
    const t=dish.types[typeIdx];
    if(typeof t==='string'||t.stock==null)continue;
    const newStock=Math.max(0,t.stock-item.qty);
    const updatedTypes=[...dish.types];
    updatedTypes[typeIdx]={...t,stock:newStock};
    await update(ref(db,`dishes/${dishId}`),{types:updatedTypes});
  }
}


function cartTotal(){
  return Object.entries(C.cart).reduce((s,[id,v])=>{
    if(id.startsWith('mitad|'))return s+(v._mitadPrice||0)*v.qty;
    if(id.startsWith('kiosk|')){const d=DB.kioskItems[v._kioskKey];return s+(d?Number(d.price)*v.qty:0);}
    if(id.startsWith('restk|')){const d=DB.dishes[v._kioskKey];return s+(d?dishFinalPrice(d,v.qty,v._typeName||null)*v.qty:0);}
    // key puede ser dishId o dishId|tipo
    const baseId=id.includes('|')?id.split('|')[0]:id;
    const d=DB.dishes[baseId]||DB.cafeteriaItems[baseId];
    if(!d)return s;
    const selType=v.selectedType||null;
    const isCaf=!!DB.cafeteriaItems[baseId];
    return s+(isCaf?Number(d.price)*v.qty:dishFinalPrice(d,v.qty,selType)*v.qty);
  },0);
}
